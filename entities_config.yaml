global:
  default_confidence_threshold: 0.85
  default_masking_strategy: redact
  language: auto
  enabled_policies: []
  label_blocklist: []
  no_multiline_entity_ids:
  - person_name
  - email_address
  - phone_number
  - fax_number
  - ssn
  - credit_card_number
  - ip_address
  - medical_record_number
  - date_of_birth
  - bank_account_number
  - bank_routing_number
  - iban
  - card_expiration_date
  - card_service_code
  - npi_number
  - dea_number
  - swift_bic_code
registry:
  policy_priority:
  - hipaa
  - pci_dss
  - law_enforcement
  - transportation
  - general
  categories:
  - id: hipaa
    label: HIPAA Safe Harbor
    description: 18 PHI identifiers (45 CFR §164.514)
    icon: 🛡
  - id: pci_dss
    label: PCI-DSS v4.0
    description: Cardholder data & sensitive authentication data
    icon: 💳
  - id: general
    label: General PII
    description: Credentials, attributes, education & employment records
    icon: 🔐
  - id: law_enforcement
    label: Law Enforcement / CJIS
    description: Criminal justice & law enforcement records
    icon: ⚖
  - id: transportation
    label: Transportation
    description: Vehicle, driver, and transit identifiers
    icon: 🚗
  detection_methods:
  - id: pattern
    label: Pattern
  - id: ner
    label: GLiNER
  - id: presidio
    label: Presidio
entities:
- id: person_name
  display_name: Person / Full Name / Alias
  description: 'Human personal names only: first name, last name, full name, nickname, or alias of a real person. Do NOT flag dates, section headers, department names, medical terms, lab test names, organization
    names, city names, or state names.'
  policy:
  - hipaa
  enabled: true
  priority: 4
  confidence_threshold: 0.62
  gliner_label: person full name
  presidio_type: PERSON
  masking:
    strategy: redact
    format: '[PERSON {n}]'
- id: physician_name
  display_name: Physician / Doctor Name
  description: 'Name of a doctor or physician identified by the ''Dr.'' or ''Doctor'' title. Example: ''Dr. Robert Hayes'', ''Dr. Miguel Santos''. Always use DOCTOR tag instead of PERSON for medical professionals
    with explicit title.'
  policy:
  - hipaa
  enabled: true
  priority: 2
  confidence_threshold: 0.75
  gliner_label: physician or doctor name
  patterns:
  - ((?:Dr\.|Doctor)\s+(?-i:[A-Z])[a-zA-Z]+(?:\s+(?-i:[A-Z])[a-zA-Z]+){1,2})
  - \b((?-i:[A-Z])[a-z]+(?:\s+(?-i:[A-Z])[a-z]+){0,2})\s+MD\.?\b
  - ((?:Dr\.?|Doctor)\s+(?-i:[A-Z])(?:[a-zA-Z]+|\.)(?:\s+(?-i:[A-Z])(?:[a-zA-Z]+\.?|\.))*?\.?)(?=[\s,.;:!?\)]|$)
  - ((?:Dr\.?|Doctor)\s+(?-i:[A-Z])[a-zA-Z]+\s+"(?-i:[A-Z])[a-zA-Z]+"\s+(?-i:[A-Z])[a-zA-Z]+)
  - ((?:Dr\.?|Doctor)\s+(?-i:[A-Z])[a-z]+\s+(?-i:[A-Z])[a-z]+\s+(?-i:[A-Z])[a-z]+)\b
  - ((?:Dr\.?|Doctor)\s+(?-i:[A-Z])[a-zA-Z]{2,}\b)
  masking:
    strategy: redact
    format: '[DOCTOR {n}]'
- id: street_address
  display_name: Street Address Line / House Number and Street
  description: 'Street address line only: house/building number + street name. Do NOT include city, state, or zip — those are separate entities. Example: ''742 Evergreen Terrace'', ''85 River Road'', ''1600
    Pennsylvania Ave NW Apt 3B'', ''Apt 12B, 900 Elm Street'', ''Flat 7C, 33 Hill Street'', ''House No 18, Maple Colony'', ''12 Rue de Rivoli, Paris''.'
  policy:
  - hipaa
  enabled: true
  priority: 2
  gliner_label: street address with house number
  patterns:
  - (\d{1,6}[A-Z]?[ \t]+(?:[A-Za-z0-9.-]+[ \t]+){1,4}(?:Avenue|Ave|Street|St|Boulevard|Blvd|Road|Rd|Lane|Ln|Drive|Dr|Court|Ct|Way|Place|Pl|Circle|Cir|Circles|Terrace|Terr|Highway|Hwy|Parkway|Pkwy|Squares?|Extensions?|Camp|Shoal|Trail|Trace|Roads?|Islands?|Route|Viaduct|Gardens?|Summit|Brook|Plains?|Points?|Center|Alley|Causeway|Prairie|Ports?|Neck|Wall|Coves?|Crescent|Station|Union|Via|Plaza|Tunnel|Springs?|Bend|Creek|Glen|Hill|Hills|Heights|Ridge|Run|Path|Pass|Pike|Row|Walk|Crossing|Landing|Loop|Meadow|Park|Overpass|Bypass|Corridor|Connector|Approach|Access|Drive|Branch|Close|Gate|Green|Grove|Hollow|Knoll|Lake|Manor|Mill|Mount|Mountain|Orchard|Overlook|Pond|Quarter|Ranch|River|Shore|Spur|Terrace|View|Village|Vista|Wood|Yard)\b\.?(?:[
    \t]+(?:Apt\.?|Apartment|Suite|Ste|Unit|#)[ \t]*[\w\-]+)?)
  - \b(\d{1,4}[A-Z]\s+[A-Z][a-zA-Z]+(?:\s+[A-Z][a-zA-Z]+){0,3}\s+(?:Street|Road|Avenue|Boulevard|Lane|Drive|Court|Way|Place|Terrace|Park|Square|Plaza|Rd\.?|St\.?|Ave\.?|Blvd\.?|Dr\.?|Ln\.?))\b
  - (?:collected\s+at|found\s+at|scene\s+at|located\s+at|crime\s+scene\s+at|residence\s+at|address\s+of)\s+(\d{1,6}[ \t]+[A-Za-z0-9 \t]+[ \t]+(?:Road|Street|Avenue|Boulevard|Drive|Court|Way|Lane|Terrace|Path|Circle|Place|Rd|St|Ave|Blvd|Dr|Ct|Ln|Pl|Terr|Cir|Hwy|Pkwy)\b\.?)
  - (?:Room|Suite|Ste|Apt|Apartment|Unit|Building|Bldg)\s*(?:Number|No|#)?\s*[:#]?\s*(\d{1,6})\b
  - \b((?:Apt|Apartment|Flat|Suite|Ste|Unit|Villa|House|H\.?\s*No|Plot|Door|Block|Tower|Bldg|Building|No\.?)\s*(?:No\.?\s*)?[\w\-]+\s*,\s*(?:\d+\s+)?[A-Z][A-Za-z0-9 ,.\-/]*?(?:Street|Road|Avenue|Boulevard|Lane|Drive|Court|Way|Place|Terrace|Highway|Parkway|Square|Gardens?|Colony|Layout|Marg|Nagar|Park|Crescent|West|East|North|South|Block|Extension|Sector|Phase|Stage|Plaza|Jumeirah|Rivoli|Pennsylvania|Baker|Pennsylvania\s+Avenue\s+NW)\b\.?)
  - \b(\d{1,5}[A-Za-z]?\s+(?:Rue|Strasse|Calle|Via|Avenida|Plaza|Plein|Gata|Ulica|Carrera|Karl[\w\-]+)\s+[A-Z][\w\s\.\-]{2,40})
  - \b(No\.?\s*\d{1,5}\s+[A-Z][A-Za-z]+(?:\s+[A-Z][A-Za-z]+){0,4}\s+(?:Street|Road|Avenue|Boulevard|Lane|Drive|Court|Way|Place|Terrace|Park|Square|Plaza|Rd\.?|St\.?|Ave\.?|Blvd\.?|Dr\.?|Ln\.?))
  - (?:Apartment\s+Address|Contact\s+Address|Delivery\s+Address|Home\s+Address|Office\s+Address|Mailing\s+Address|Billing\s+Address|Service\s+Address|Warehouse\s+Address|Customer\s+Address|Postal\s+Address|Residential\s+Address|Permanent\s+Address|Correspondence\s+Address|Shipping\s+Address|Suite\s+Address)\s*[:#]?\s*([A-Za-z0-9][\w\d\s,.\-#/]{6,80}?(?:Street|Road|Avenue|Boulevard|Lane|Drive|Way|Court|Place|Terrace|Park|Square|Gardens?|Colony|Layout|Marg|Nagar|Plaza|Highway|Parkway|Crescent|Block|Extension|Sector|Phase|Stage|Boulevard|Rd\.?|St\.?|Ave\.?|Blvd\.?|Dr\.?|Ln\.?|Ct\.?|Pl\.?|Terr\.?|Cir\.?|Hwy\.?|Pkwy\.?))\b
  - (?:DELIVERY\s+ADDRESS|APT\s+ADDRESS#?|SUITE\s+ADDRESS[-\s]?ID|HOME\s+ADDRESS#?|MAILING\s+ADDRESS[-\s]?ID|BILLING\s+ADDRESS#?|OFFICE\s+ADDRESS[-\s]?ID|WAREHOUSE\s+ADDRESS#?|CUSTOMER\s+ADDRESS[-\s]?ID|POSTAL\s+ADDRESS#?|RESIDENTIAL\s+ADDRESS[-\s]?ID)\s*[:#]?\s*([A-Za-z0-9][\w\d\s,.\-#/]{6,80}?(?:Street|Road|Avenue|Boulevard|Lane|Drive|Way|Court|Place|Terrace|Park|Square|Gardens?|Colony|Layout|Marg|Nagar|Plaza|Highway|Parkway|Crescent|Block|Extension|Sector|Phase|Stage|Boulevard|Rd\.?|St\.?|Ave\.?|Blvd\.?|Dr\.?|Ln\.?|Ct\.?|Pl\.?|Terr\.?|Cir\.?|Hwy\.?|Pkwy\.?))\b
  masking:
    strategy: redact
    format: '[ADDRESS {n}]'
- id: city_name
  display_name: City Name / Town / Municipality
  description: 'Name of a city, town, or municipality when it is part of a personal address or location disclosure. Example: ''Chicago'', ''San Francisco'', ''Newark''. Do NOT flag city names mentioned
    as generic geographic context.'
  policy:
  - hipaa
  enabled: true
  priority: 1
  confidence_threshold: 0.72
  gliner_label: city or town in a personal address
  presidio_type: LOCATION
  patterns:
  - ',\s*((?:St\.\s+)?[A-Z][a-zA-Z]+(?:[ \t][A-Z][a-zA-Z]+){0,2}),\s*(?:AL|AK|AZ|AR|CA|CO|CT|DE|FL|GA|HI|ID|IL|IN|IA|KS|KY|LA|ME|MD|MA|MI|MN|MS|MO|MT|NE|NV|NH|NJ|NM|NY|NC|ND|OH|OK|OR|PA|RI|SC|SD|TN|TX|UT|VT|VA|WA|WV|WI|WY|DC)\b'
  - (?:in|of|at|near|from|residing\s+in|lives?\s+in|located\s+in)\s+((?:St\.\s+)?[A-Z][a-zA-Z]+(?:[ \t][A-Z][a-zA-Z]+){0,2}),?\s*(?:AL|AK|AZ|AR|CA|CO|CT|DE|FL|GA|HI|ID|IL|IN|IA|KS|KY|LA|ME|MD|MA|MI|MN|MS|MO|MT|NE|NV|NH|NJ|NM|NY|NC|ND|OH|OK|OR|PA|RI|SC|SD|TN|TX|UT|VT|VA|WA|WV|WI|WY|DC)\b
  - \d+\s+\w+(?:\s+\w+){0,4},\s+((?:St\.\s+)?[A-Z][a-zA-Z]+(?:[ \t][A-Z][a-zA-Z]+){0,2}),\s*(?:AL|AK|AZ|AR|CA|CO|CT|DE|FL|GA|HI|ID|IL|IN|IA|KS|KY|LA|ME|MD|MA|MI|MN|MS|MO|MT|NE|NV|NH|NJ|NM|NY|NC|ND|OH|OK|OR|PA|RI|SC|SD|TN|TX|UT|VT|VA|WA|WV|WI|WY|DC)\b
  - (?:,\s*)?((?:St\.\s+)?[A-Z][a-zA-Z]+(?:[ \t][A-Z][a-zA-Z]+){0,2})\s+(?:AL|AK|AZ|AR|CA|CO|CT|DE|FL|GA|HI|ID|IL|IN|IA|KS|KY|LA|ME|MD|MA|MI|MN|MS|MO|MT|NE|NV|NH|NJ|NM|NY|NC|ND|OH|OK|OR|PA|RI|SC|SD|TN|TX|UT|VT|VA|WA|WV|WI|WY|DC)\b
  masking:
    strategy: redact
    format: '[LOCATION {n}]'
- id: us_state
  display_name: US State / Territory (full name or abbreviation)
  description: US state, territory, or District of Columbia — full name (e.g. 'California', 'New York') or two-letter abbreviation (e.g. 'CA', 'NY'). Detected when adjacent to a city/zip, or when explicitly
    labelled with a state-keyword (US State, Residence State, Billing State, Mailing State, Patient State, etc.).
  policy:
  - hipaa
  enabled: true
  priority: 3
  gliner_label: US state abbreviation or full name in address
  patterns:
  - (?:,\s*)(AL|AK|AZ|AR|CA|CO|CT|DE|FL|GA|HI|ID|IL|IN|IA|KS|KY|LA|ME|MD|MA|MI|MN|MS|MO|MT|NE|NV|NH|NJ|NM|NY|NC|ND|OH|OK|OR|PA|RI|SC|SD|TN|TX|UT|VT|VA|WA|WV|WI|WY|DC)(?=\s+\d{5})
  - (?:[A-Z][a-z]+(?:\s+[A-Z][a-z]+){0,2}),\s*(AL|AK|AZ|AR|CA|CO|CT|DE|FL|GA|HI|ID|IL|IN|IA|KS|KY|LA|ME|MD|MA|MI|MN|MS|MO|MT|NE|NV|NH|NJ|NM|NY|NC|ND|OH|OK|OR|PA|RI|SC|SD|TN|TX|UT|VT|VA|WA|WV|WI|WY|DC)\b
  - (?:US\s+State|U\.S\.\s+State|State\s+Name|American\s+State|Residence\s+State|Registered\s+State|Billing\s+State|Shipping\s+State|Patient\s+State|Customer\s+State|Business\s+State|Legal\s+State|Home\s+State|Mailing\s+State|Work\s+State|Service\s+State|Clinic\s+State|State)\s*[:#]?\s*(Alabama|Alaska|Arizona|Arkansas|California|Colorado|Connecticut|Delaware|Florida|Georgia|Hawaii|Idaho|Illinois|Indiana|Iowa|Kansas|Kentucky|Louisiana|Maine|Maryland|Massachusetts|Michigan|Minnesota|Mississippi|Missouri|Montana|Nebraska|Nevada|New\s+Hampshire|New\s+Jersey|New\s+Mexico|New\s+York|North\s+Carolina|North\s+Dakota|Ohio|Oklahoma|Oregon|Pennsylvania|Rhode\s+Island|South\s+Carolina|South\s+Dakota|Tennessee|Texas|Utah|Vermont|Virginia|Washington|West\s+Virginia|Wisconsin|Wyoming|District\s+of\s+Columbia)\b
  - (?:STATE[-\s]?ID|RESIDENCE\s+STATE\s+NO|BILLING\s+STATE#?|SHIPPING\s+STATE[-\s]?ID|WORK\s+STATE\s+NO|MAILING\s+STATE#?|HOME\s+STATE[-\s]?ID|PATIENT\s+STATE#?|US\s+STATE[-\s]?ID)\s*[:#]?\s*([A-Z][a-zA-Z]+(?:\s+[A-Z][a-zA-Z]+){0,2})\b
  - (?:US\s+state|U\.S\.\s+state|state|residence\s+state|registered\s+state|billing\s+state|shipping\s+state|patient\s+state|customer\s+state|business\s+state|legal\s+state|home\s+state|mailing\s+state|work\s+state|service\s+state|clinic\s+state)\s+(AL|AK|AZ|AR|CA|CO|CT|DE|FL|GA|HI|ID|IL|IN|IA|KS|KY|LA|ME|MD|MA|MI|MN|MS|MO|MT|NE|NV|NH|NJ|NM|NY|NC|ND|OH|OK|OR|PA|RI|SC|SD|TN|TX|UT|VT|VA|WA|WV|WI|WY|DC)\b
  - \b(Alabama|Alaska|Arizona|Arkansas|California|Colorado|Connecticut|Delaware|Florida|Georgia|Hawaii|Idaho|Illinois|Indiana|Iowa|Kansas|Kentucky|Louisiana|Maine|Maryland|Massachusetts|Michigan|Minnesota|Mississippi|Missouri|Montana|Nebraska|Nevada|New\s+Hampshire|New\s+Jersey|New\s+Mexico|New\s+York|North\s+Carolina|North\s+Dakota|Ohio|Oklahoma|Oregon|Pennsylvania|Rhode\s+Island|South\s+Carolina|South\s+Dakota|Tennessee|Texas|Utah|Vermont|Virginia|Washington|West\s+Virginia|Wisconsin|Wyoming|District\s+of\s+Columbia)\b
  - \b(Alabama|Alaska|Arizona|Arkansas|California|Colorado|Connecticut|Delaware|Florida|Georgia|Hawaii|Idaho|Illinois|Indiana|Iowa|Kansas|Kentucky|Louisiana|Maine|Maryland|Massachusetts|Michigan|Minnesota|Mississippi|Missouri|Montana|Nebraska|Nevada|New\s+Hampshire|New\s+Jersey|New\s+Mexico|New\s+York|North\s+Carolina|North\s+Dakota|Ohio|Oklahoma|Oregon|Pennsylvania|Rhode\s+Island|South\s+Carolina|South\s+Dakota|Tennessee|Texas|Utah|Vermont|Virginia|Washington|West\s+Virginia|Wisconsin|Wyoming|District\s+of\s+Columbia)\s*[\(\[\-_,/:]\s*[A-Z]{2}\s*[\)\]]?\b
  - (?:[\(\[]\s*|[-_/:]\s*)(AL|AK|AZ|AR|CA|CO|CT|DE|FL|GA|HI|ID|IL|IN|IA|KS|KY|LA|ME|MD|MA|MI|MN|MS|MO|MT|NE|NV|NH|NJ|NM|NY|NC|ND|OH|OK|OR|PA|RI|SC|SD|TN|TX|UT|VT|VA|WA|WV|WI|WY|DC)\s*[\)\]]?\b
  masking:
    strategy: redact
    format: '[STATE {n}]'
- id: zipcode
  display_name: ZIP Code / Postal Code
  description: 'US ZIP code (5-digit or ZIP+4), or international postal code (UK, Canada, India, France, Germany, Australia) when part of a personal address. Example: ''60614'', ''94303'', ''07102-1234'',
    ''SW1A 1AA'', ''M5V 3L9''.'
  policy:
  - hipaa
  enabled: true
  priority: 3
  gliner_label: ZIP code or postal code
  patterns:
  - (?:,?\s*\b[A-Z]{2}\b\s+)(\d{5}(?:-\d{4})?)\b
  - (?:zip|postal)\s+(?:code|#)?\s*:?\s*(\d{5}(?:-\d{4})?)
  - (?<!\d)(\d{5}-\d{4})(?!\d)
  - (?:Zipcode|ZIP\s+(?:Code|Number|No)|ZIP|Office\s+ZIP\s+Number|Service\s+Area\s+ZIP|Government\s+ZIP\s+Number|Mailing\s+ZIP|Billing\s+ZIP|Delivery\s+ZIP|Postal\s+Code|Post\s+Code|PIN\s+Code)\s*[:#]?\s*(\d{4,6}(?:-\d{4})?)\b
  - (?:ZIP\s+NO|ZIP#?|ZIPCODE[-\s]?ID|POSTAL\s+CODE#?|MAILING\s+ZIP\s+NO|BILLING\s+POSTAL[-\s]?ID|DELIVERY\s+ZIP#?|SERVICE\s+AREA\s+ZIP[-\s]?ID|OFFICE\s+ZIP[-\s]?ID|GOVT\s+ZIP\s+NO)\s*[:#]?\s*(\d{4,6}(?:-\d{4})?|[A-Z]{1,2}\d[A-Z\d]?\s*\d[A-Z]{2}|[A-Z]\d[A-Z]\s*\d[A-Z]\d)\b
  - \b([A-Z]{1,2}\d[A-Z\d]?\s\d[A-Z]{2})\b
  - \b([A-Z]\d[A-Z]\s\d[A-Z]\d)\b
  - (?:[A-Z][a-zA-Z]+,?\s+)(\d{6})(?!\d)
  - (?:Paris|Lyon|Marseille|Toulouse|Nice|Bordeaux|Lille|Nantes|Strasbourg)\s*,?\s*(\d{5})(?!\d)
  - (?:Berlin|Munich|Hamburg|Cologne|Frankfurt|Stuttgart|Dusseldorf|Leipzig|Dortmund)\s*,?\s*(\d{5})(?!\d)
  - (?:Sydney|Melbourne|Brisbane|Perth|Adelaide|Hobart|Darwin|Canberra|NSW|VIC|QLD|WA|SA|TAS|NT|ACT)\s*,?\s*(\d{4})(?!\d)
  - (?<!\d)((?:0[1-9]|[1-9]\d)\d{3})(?!\d)
  - (?<!\d)([1-9]\d{5})(?!\d)
  masking:
    strategy: redact
    format: '[ZIPCODE {n}]'
- id: precise_geolocation
  display_name: Precise Geolocation
  description: 'GPS coordinates or precise physical location data. Example: 37.7749, -122.4194'
  policy:
  - hipaa
  enabled: true
  priority: 2
  confidence_threshold: 0.88
  gliner_label: GPS coordinates or precise geolocation
  patterns:
  - ((?:-?\d{1,3}\.\d{4,8})\s*,\s*(?:-?\d{1,3}\.\d{4,8}))
  - (?:lat(?:itude)?|lon(?:g(?:itude)?)?)\s*[:#=]?\s*(-?\d{1,3}\.\d{4,8})
  - (\d{1,3}\.\d{2,8}°?\s*[NS](?:\s*,\s*\d{1,3}\.\d{2,8}°?\s*[EW])?)
  - \b(LAT(?:ITUDE)?\s+-?\d{1,3}\.\d{2,8}\s*,?\s+LN[GP](?:ITUDE)?\s+-?\d{1,3}\.\d{2,8})\b
  - \b(POINT\s*\(\s*-?\d{1,3}\.\d{2,8}\s+-?\d{1,3}\.\d{2,8}\s*\))
  - \b([NS]\s+-?\d{1,3}\.\d{2,8}\s+[EW]\s+-?\d{1,3}\.\d{2,8})\b
  - \b(-?\d{1,3}\.\d{2,8}°\s*[NS]\s+-?\d{1,3}\.\d{2,8}°\s*[EW])\b
  - (\d{1,3}°\d{1,2}['\u2019]\d{1,2}(?:\.\d+)?["\u201D]\s*[NS]\s+\d{1,3}°\d{1,2}['\u2019]\d{1,2}(?:\.\d+)?["\u201D]\s*[EW])
  - (\[-?\d{1,3}\.\d{2,8}\s*,\s*-?\d{1,3}\.\d{2,8}\])
  - \b([23456789CFGHJMPQRVWX]{4,6}\+[23456789CFGHJMPQRVWX]{2,3})\b
  masking:
    strategy: redact
    format: '[GPS {n}]'
- id: date_of_birth
  display_name: Date of Birth
  description: Flag only the actual date value (e.g. 07/15/2005, 15/07/2005, 2005-07-15, March 14 1988) when near keywords DOB, Date of Birth, born on. NOT the label word 'DOB' itself. NOT visit dates or
    report dates.
  policy:
  - hipaa
  enabled: true
  priority: 2
  counter_group: date
  gliner_label: date of birth
  patterns:
  - (?:DOB|Date\s+of\s+Birth)\s*[:#]?\s*(\d{1,2}[/.\-]\d{1,2}[/.\-]\d{2,4})
  - (?:DOB|Date\s+of\s+Birth)\s*[:#]?\s*(\d{4}-\d{2}-\d{2})
  - born\s+on\s+(\d{1,2}[/.\-]\d{1,2}[/.\-]\d{2,4})
  - born\s+on\s+(\d{4}-\d{2}-\d{2})
  - (?:born|dob|date\s+of\s+birth)\s*[:#]?\s*([A-Za-z]+\s+\d{1,2},?\s+\d{4})
  - (\d{1,2}(?:st|nd|rd|th)?\s+(?:January|February|March|April|May|June|July|August|September|October|November|December|Jan|Feb|Mar|Apr|Jun|Jul|Aug|Sep|Oct|Nov|Dec)\s+\d{2,4})
  - ((?:January|February|March|April|May|June|July|August|September|October|November|December|Jan|Feb|Mar|Apr|Jun|Jul|Aug|Sep|Oct|Nov|Dec)\s+\d{1,2}(?:st|nd|rd|th)?,?\s+\d{2,4})
  - (?:Monday|Tuesday|Wednesday|Thursday|Friday|Saturday|Sunday|Mon|Tue|Wed|Thu|Fri|Sat|Sun),?\s+(\d{1,2}\s+(?:January|February|March|April|May|June|July|August|September|October|November|December|Jan|Feb|Mar|Apr|Jun|Jul|Aug|Sep|Oct|Nov|Dec)\s+\d{2,4})
  - (\d{4}_\d{2}_\d{2})
  - (\d{2}_(?:Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)_\d{4})
  - \b(\d{1,2}-(?:Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec|JAN|FEB|MAR|APR|MAY|JUN|JUL|AUG|SEP|OCT|NOV|DEC)-\d{2,4})\b
  - (\d{1,2}/(?:JAN|FEB|MAR|APR|MAY|JUN|JUL|AUG|SEP|OCT|NOV|DEC)/\d{4})
  - (?:issued|year|since|from|until|through|as\s+of|effective|enrollment|graduated|employed|convicted|sentenced|born\s+in)\s+(\b20\d{2}\b)
  - (?:commercial\s+license|driver.s\s+license|certificate|degree|permit)\s+(?:issued\s+)?(\b(?:19|20)\d{2}\b)
  - (?:\bYear\b|\bYEAR\b)\s*[:#=]?\s*(\b(?:19|20)\d{2}\b)
