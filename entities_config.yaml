# ══════════════════════════════════════════════════════════════════════════════
# TRANSPORTATION — Vehicle, Driver, and Transit-Specific Identifiers
# ══════════════════════════════════════════════════════════════════════════════

  - id: driver_history
    display_name: Driver History Record
    description: "Driver history, driving record, or DMV record. Detect based on keyword: driving record, driver history, DMV record"
    policy: [transportation]
    enabled: true
    priority: 1
    gliner_label: "driving record or DMV record"
    patterns:
      - '(?:driving\s+record|driver\s+history|DMV\s+record)\s*(?:file|report|record|#|number|no\.?)?\s*[:#]?\s*([A-Z]{1,4}-?\d[\dA-Z\-]{1,})'
      # DH-NNNNNN bare prefix format (GAP-19)
      - '\b(DH-\d{2,10})\b'
      - '\b((?-i:[A-Z]{2,6})-\d{3,}(?:-\d{1,6})*)\b'
    masking:
      strategy: redact
      format: "[DRIVER HISTORY {n}]"

  - id: bart_employee_id
    display_name: BART Employee ID
    description: "BART (Bay Area Rapid Transit) employee or contractor identifier. Detected by keyword (BART Employee ID, BART Worker ID, BART Personnel Number, Operator ID, Badge Number, Workforce ID, Crew ID, Contractor ID, Transit Staff Identifier, etc.) or by industry prefix code (BWI, BPN, BOI, TSI, BBN, BWF, BCI, BCN, EBI, TPC, BIEC, BRC, TWI, BEI, BART, BST, BEN, BARTEMP, TEI, REI, TEN, TAE, BHR, SEI, BMS, PTE, TOS, BTM, TRE, MTS, OP, TTI, RTC)."
    policy: [transportation]
    enabled: true
    priority: 1
    gliner_label: "BART transit employee ID"
    patterns:
      - '(?:BART\s+)?Employee\s+ID\s*[:#]?\s*(\d{4,8})'
      - 'Emp(?:loyee)?\s*(?:ID|No)\s*[:#]?\s*(\d{4,8})'
      # Industry prefix codes — full BART workforce code-set.
      # Examples: "BART-123456", "BWI-556677", "BPN-990011", "BOI-665544",
      # "TSI-887766", "BBN-101010", "BWF-565656", "BCI-909090", "BCN-676767",
      # "EBI-484848", "TPC-565757", "BIEC-999111", "BRC-556611", "TWI-991144",
      # "BEI-883322", "BST-998877", "BEN-445566", "BARTEMP-112233",
      # "TEI-778899", "REI-223344", "TEN-787878", "TAE-334455", "BHR-121212",
      # "SEI-343434", "BMS-454545", "PTE-232323", "TOS-787121", "BTM-334122",
      # "TRE-441188", "MTS-121909", "OP-7788", "TTI-5544", "RTC-7878".
      - '\b((?:BART|BWI|BPN|BOI|TSI|BBN|BWF|BCI|BCN|EBI|TPC|BIEC|BRC|TWI|BEI|BST|BEN|BARTEMP|TEI|REI|TEN|TAE|BHR|SEI|BMS|PTE|TOS|BTM|TRE|MTS|OP|TTI|RTC)-[A-Za-z0-9]{4,10})\b'
      # Title-case keyword anchors — comprehensive label coverage:
      # "BART Worker ID", "BART Personnel Number", "BART Operator ID",
      # "Transit Staff Identifier", "BART Badge Number", "BART Workforce ID",
      # "BART Crew ID", "BART Contractor ID", "Employee Badge ID",
      # "Transit Personnel Code", "BART Internal Employee Code",
      # "BART Rail Crew Number", "Transportation Workforce Identifier",
      # "BART Employee Identifier", "BART Operator Badge",
      # "Transit Technician Identifier", "Rapid Transit Crew Number".
      - '(?:BART\s+(?:Worker\s+ID|Personnel\s+Number|Operator\s+ID|Operator\s+Badge|Badge\s+Number|Workforce\s+ID|Crew\s+ID|Contractor\s+ID|Internal\s+Employee\s+Code|Rail\s+Crew\s+Number|Employee\s+Identifier|Employee\s+ID|Staff\s+ID|Team\s+Member\s+ID)|Transit\s+(?:Staff\s+Identifier|Personnel\s+Code|Technician\s+Identifier|Workforce\s+Identifier|Ops\s+Staff|Personnel)|Rapid\s+Transit\s+Crew\s+Number|Employee\s+Badge\s+ID|Transportation\s+Workforce\s+Identifier|Maintenance\s+Staff\s+ID|Station\s+Employee\s+No|Rail\s+Employee\s+ID)\s*[:#]?\s*([A-Za-z0-9][A-Za-z0-9\-]{3,15})'
      # All-uppercase label form: "BART STAFF#: BST-998877",
      # "TRANSIT EMP-ID: TEI-778899", "BART BADGE NO: BBN-101010",
      # "RAIL EMPLOYEE#: REI-223344", "WORKFORCE ID#: BWF-565656",
      # "CONTRACTOR-ID: BCN-676767", "STATION EMP NO: SEI-343434",
      # "MAINTENANCE STAFF-ID: BMS-454545", "TRANSIT PERSONNEL#: TPC-565757",
      # "EMPLOYEE BADGE#: EBI-484848", "TEAM MEMBER-ID: BTM-334122",
      # "INTERNAL EMP CODE: BIEC-999111", "TRANSIT OPS STAFF#: TOS-787121",
      # "WORKFORCE IDENTIFIER: TWI-991144".
      - '(?:BART\s+STAFF#?|TRANSIT\s+EMP[-\s]?ID|BART\s+BADGE\s+NO|RAIL\s+EMPLOYEE#?|WORKFORCE\s+ID#?|CONTRACTOR[-\s]?ID|STATION\s+EMP\s+NO|MAINTENANCE\s+STAFF[-\s]?ID|TRANSIT\s+PERSONNEL#?|EMPLOYEE\s+BADGE#?|TEAM\s+MEMBER[-\s]?ID|INTERNAL\s+EMP\s+CODE|TRANSIT\s+OPS\s+STAFF#?|WORKFORCE\s+IDENTIFIER|BART\s+EMP\s+ID#?|BART\s+OPERATOR\s+BADGE)\s*[:#]?\s*([A-Za-z0-9][A-Za-z0-9\-]{3,15})'
    masking:
      strategy: redact
      format: "[BART EMP ID {n}]"

# =============================================================================
# GENERAL PII — Financial, Employment, Travel, Education, Legal
# =============================================================================

  - id: financial_amount
    display_name: Transaction / Financial Amount
    description: "Dollar or currency amount in a financial transaction, payment, or account context. Example: '$12,450', '$18,700.00', '$219.96', '1002.00 USD'."
    policy: [general]
    enabled: true
    priority: 2
    gliner_label: "financial dollar amount"
    patterns:
      - '(\$\s*[\d,]+(?:\.\d{1,2})?)\b'
      - '((?:\d{1,3}(?:,\d{3})+|\d+)(?:\.\d{1,2})?)\s+(?:USD|EUR|GBP|CAD|AUD|INR|JPY|CNY|CHF|MXN|BRL)\b'
      - '([₹€£¥₩฿]\s*[\d,]+(?:\.\d{1,2})?)\b'
      # Currency code BEFORE amount: USD 1250.00, EUR 780.50, INR 45999.99
      - '(?<![A-Za-z])((?:USD|EUR|GBP|CAD|AUD|INR|JPY|CNY|CHF|MXN|BRL|AED|SGD|HKD|QAR|SAR|THB|MYR)\s+[\d,]+(?:\.\d{1,2})?)\b'
      # Amount with K/M/L suffix: €1.5M, £1.1K, ₹89K, ₹8.75L
      - '([₹€£¥$]\s*[\d,]+(?:\.\d{1,2})?[KkMmLlBb])\b'
      # Amount + currency code with K/M: 2.5M JPY, EUR 50K
      - '([\d,]+(?:\.\d{1,2})?[KkMm]\s+(?:USD|EUR|GBP|CAD|AUD|INR|JPY|CNY|CHF|MXN|BRL|AED|SGD))\b'
    masking:
      strategy: redact
      format: "[AMOUNT {n}]"

  - id: card_type
    display_name: Payment Card Brand (Visa / Mastercard / Amex / Discover)
    description: "Payment card network brand ONLY: Visa, Mastercard, American Express, Discover, JCB, UnionPay. Do NOT flag automobile brands, clothing brands, or any non-payment-card brands."
    policy: [pci_dss]
    enabled: true
    priority: 3
    gliner_label: "payment card brand Visa Mastercard Amex"
    patterns:
      - '\b(Visa|Mastercard|Master\s*Card|American\s+Express|AmEx|AMEX|Discover|JCB|UnionPay)\b'
    masking:
      strategy: redact
      format: "[CARD TYPE {n}]"

  - id: card_last4
    display_name: Card Last 4 Digits
    description: "Last 4 digits of a payment card referenced as 'ending in XXXX' or 'last four digits XXXX'. Example: 'card ending in 8821', 'ending in 4451'."
    policy: [pci_dss]
    enabled: true
    priority: 2
    gliner_label: "last 4 digits of card number"
    patterns:
      - '(?:card|account)\s+ending\s+in\s+(\d{4})'
      - 'ending\s+in\s+(\d{4})'
      - 'last\s+(?:four|4)\s+(?:digits?)?\s*[:#]?\s*(\d{4})'
      # "Last Four: 8821" or "last 4: 4451"
      - 'last\s+(?:four|4)\s*[:#]\s*(\d{4})'
      # "card x-xxxx" or "card no. ending ####"
      - '(?:x{3,}[-–]|xxxx[-–])(\d{4})\b'
      # Asterisk-masked card formats: ****1234, **** 8877, **** **** **** 9012
      - '(?:\*{3,}[-\s]*)+(\d{4})\b'
      # XXXX-5678 uppercase X format
      - '(?:X{4}[-\s]*)(\d{4})\b'
      # More keyword variants: "Last Four of Card:", "Card Suffix:", "Masked Card Number:"
      - '(?:Last\s+Four\s+(?:of\s+)?(?:Card|Digits)|Card\s+(?:Suffix|Tail\s+Number|Last\s*4|Last4|Last\s+Digits)|Masked\s+Card\s+Number|Payment\s+Card\s+Last\s*4|Secure\s+Card\s+Ending|Transaction\s+Card\s+Last\s*4|Digital\s+Wallet\s+Card\s+Ending|Corporate\s+Card\s+Ending|Bank\s+Card\s+Last\s+Digits|EMV\s+Card\s+Ending|Virtual\s+Card\s+Last\s*4)\s*[:#]?\s*(?:\*+\s*)?(\d{4})\b'
      # UPPERCASE labels: "ENDING DIGITS-ID: 9012", "CARD ENDING#: 4455"
      - '(?:ENDING\s+DIGITS[-\s]?ID|CARD\s+ENDING#?|MASKED\s+CARD[-\s]?ID|CARD\s+SUFFIX#?|PAYMENT\s+LAST\s*4[-\s]?ID|BANK\s+CARD\s+ENDING#?)\s*[:#]?\s*(?:\*+\s*)?(\d{4})\b'
    masking:
      strategy: redact
      format: "[CARD LAST4 {n}]"

  - id: employee_id
    display_name: Employee ID / Staff Number
    description: "Employee identification number. Example: 'EMP-77421', 'EMPID-12345'. Detect near keywords: Employee ID, Staff ID, EMP."
    policy: [general]
    enabled: true
    priority: 1
    gliner_label: "employee ID number"
    patterns:
      - '\bEMP-[A-Za-z0-9\-]{3,12}\b'
      - '(?:Employee|Staff)\s+(?:ID|Number|No)\s*[:#=]?\s*(?:is\s+)?([A-Za-z0-9\-]{3,15})'
      - '\b((?:WIN|EBN|WFI|CEI|HRE|AEI|REN|OEI|PEN|DEI|OEN|GEI)-\d{3,})\b'
      - '\b((?-i:[A-Z]{2,6})-\d{3,}(?:-\d{1,6})*)\b'
      - '\b((?-i:[A-Z]{2,8})\d{4,})\b'
      - '\b([a-z]{2,}(?:_[a-z]+)+_\d{3,})\b'
    masking:
      strategy: redact
      format: "[EMPLOYEE ID {n}]"

  - id: medication_name
    display_name: Prescription Medication / Drug Name with Dosage
    description: "Name of a prescribed medication, drug, or pharmaceutical treatment, typically with dosage. Example: 'Prednisone 20mg', 'Albuterol inhaler', 'Lisinopril 10mg daily', 'Metformin 500mg'."
    policy: [hipaa]
    enabled: true
    # Group C: 2 → 3 — open-vocabulary NER entity. Should beat person_name
    # (4) when GLiNER tags overlap, but lose to structured pattern matches.
    priority: 3
    confidence_threshold: 0.45
    gliner_label: "prescription medication name with dosage"
    patterns:
      # Known medication names with dosage
      - '((?:Prednisone|Metformin|Ibuprofen|Atorvastatin|Lisinopril|Amoxicillin|Omeprazole|Aspirin|Gabapentin|Levothyroxine|Amlodipine|Losartan|Albuterol|Sertraline|Furosemide|Simvastatin|Metoprolol|Warfarin|Clopidogrel|Hydrochlorothiazide|Enalapril|Ramipril|Pantoprazole|Esomeprazole|Ciprofloxacin|Azithromycin|Doxycycline|Tramadol|Oxycodone|Morphine|Codeine|Fentanyl|Hydrocodone|Acetaminophen|Naproxen|Celecoxib|Montelukast|Fluoxetine|Escitalopram|Duloxetine|Citalopram|Bupropion|Venlafaxine|Trazodone|Alprazolam|Clonazepam|Lorazepam|Zolpidem|Quetiapine|Aripiprazole|Risperidone|Olanzapine|Lithium|Lamotrigine|Valproate|Carbamazepine|Phenytoin|Levetiracetam|Topiramate|Diazepam|Clonidine|Prazosin|Spironolactone|Metformin|Glipizide|Glimepiride|Sitagliptin|Pioglitazone|Insulin|Insulin\s+glargine|Insulin\s+aspart|Insulin\s+lispro|Lantus|Humalog|Novolog|Basaglar|Toujeo|Tresiba|Dexamethasone|Methylprednisolone|Hydrocortisone|Triamcinolone|Budesonide|Fluticasone|Mometasone|Cetirizine|Loratadine|Diphenhydramine|Ranitidine|Famotidine|Metoclopramide|Ondansetron|Promethazine|Amitriptyline|Nortriptyline|Doxepin|Imipramine|Clomipramine|Phenobarbital|Clonazepam|Diazepam|Baclofen|Cyclobenzaprine|Carisoprodol|Methocarbamol|Tizanidine|Atenolol|Carvedilol|Bisoprolol|Propranolol|Labetalol|Diltiazem|Verapamil|Nifedipine|Felodipine|Isosorbide|Nitroglycerin|Digoxin|Amiodarone|Sotalol|Apixaban|Rivaroxaban|Dabigatran|Heparin|Enoxaparin|Clopidogrel|Prasugrel|Ticagrelor|Rosuvastatin|Pravastatin|Fluvastatin|Lovastatin|Ezetimibe|Fenofibrate|Gemfibrozil|Niacin|Colchicine|Allopurinol|Febuxostat|Probenecid|Hydroxychloroquine|Methotrexate|Sulfasalazine|Leflunomide|Adalimumab|Etanercept|Infliximab|Rituximab|Adalimumab|Azathioprine|Mycophenolate|Tacrolimus|Cyclosporine|Prednisone|Methylprednisolone|Prednisolone|Dexamethasone|Betamethasone)\s+\d+(?:\.\d+)?(?:mg|mcg|g|ml|mL|IU|units?|mg/dl|mmol)(?:\/(?:day|dose|tablet|capsule))?\b)'
      # Generic pattern: Title-case drug name + dosage
      - '((?-i:[A-Z])[a-z]{3,}(?:in|ol|am|ide|ine|ate|one|il|ar|ex|en|ax|on|ab|mab|tinib|ciclovir|cycline|mycin|cillin|oxacin|azole|statin|pril|sartan|olol|dipine|prazole|tidine|setron)\s+\d+(?:\.\d+)?(?:mg|mcg|g|ml|mL|IU|units?))'
      # Formulation without dosage: "Albuterol inhaler"
      - '\b(Albuterol\s+inhaler)\b'
      - '\b((?-i:[A-Z])[a-z]{4,})\s+(?:inhaler|tablet|capsule|solution|suspension|cream|ointment|patch|spray|drops)\b'
    masking:
      strategy: redact
      format: "[MEDICATION {n}]"

  - id: vehicle_registration
    display_name: Vehicle Registration Number
    description: "Vehicle registration or license plate number. Example: 'TX-98-AB-2211', 'CA 7ABC123'. Different from VIN."
    policy: [general]
    enabled: true
    priority: 2
    gliner_label: "vehicle registration number"
    patterns:
      - '\b([A-Z]{2}-\d{2,3}-[A-Z]{2}-\d{3,4})\b'
      # REG-STATE-NNNNNN registration format (REG-OH-609033, REG-CO-617911)
      - '\b(REG-[A-Z]{2}-\d{4,7})\b'
      - '(?:License\s+Plate|Plate\s+No|Vehicle\s+Plate|Tag\s+No)\s*[:#]?\s*([A-Za-z0-9\-]{4,10})'
    masking:
      strategy: redact
      format: "[VEHICLE NUMBER {n}]"

  - id: student_id
    display_name: Student ID Number
    description: "Student identification number. Example: 'STU-551992'. Detect near keyword: Student ID."
    policy: [general]
    enabled: true
    priority: 1
    gliner_label: "student ID number"
    patterns:
      - '\bSTU-[A-Za-z0-9\-]{3,12}\b'
      - 'Student\s+(?:ID|Number|No)\s*[:#=]?\s*(?:is\s+)?([A-Za-z0-9\-]{3,15})'
      - '\b((?:SN|USI|CSN|CSI|ASN|RSI|ESN|ISI|ENR|CLS|SCH|ADM|LPS|EXM|DSN)-\d{3,})\b'
      # institution-prefixed multi-segment: NYU-STUDENT-112233, MIT-STUDENT-009912
      - '\b((?-i:[A-Z]{2,}-[A-Z]{3,})-\d{4,})\b'
      # generic structured record-id (uppercase prefix, hyphen, digits)
      - '\b((?-i:[A-Z]{2,6})-\d{3,}(?:-\d{1,6})*)\b'
    masking:
      strategy: redact
      format: "[STUDENT ID {n}]"

  - id: tax_id_number
    display_name: Tax Identification Number / TIN / EIN
    description: "Tax identification, employer identification, or individual taxpayer ID. Example: 'TAX-882119', 'EIN 12-3456789', 'TIN-123456789'. Capture the full token including label prefix."
    policy: [general]
    enabled: true
    priority: 1
    gliner_label: "tax ID EIN TIN"
    patterns:
      - '(\bEIN\s*[-:#=]?\s*\d{2}[-\s]\d{7})\b'
      - '(\bTIN[-:#=\s]\s*[A-Za-z0-9][A-Za-z0-9\-]{3,14})\b'
      - '(\bTAX[-\s]ID[-:#=\s]\s*[A-Za-z0-9][A-Za-z0-9\-]{3,14})\b'
      - '(Tax\s+(?:Identification|ID)\s+(?:Number|No)\s*[-:#=]\s*[A-Za-z0-9][A-Za-z0-9\-]{3,14})'
      - '\b(\d{2}-\d{7})\b'
      - '\b(TAX_ID_NUMBER-\d{4,10})\b'
      # Indian GSTIN: 2-digit state + 10-char PAN + entity digit + Z + checksum
      - '\b((?-i:\d{2}[A-Z]{5}\d{4}[A-Z][A-Z0-9]Z[A-Z0-9]))\b'
      # Indian PAN: 5 letters + 4 digits + 1 letter
      - '\b((?-i:[A-Z]{5}\d{4}[A-Z]))\b'
      # Indian CIN: L/U + 5 digits + 2 letters + 4 digits + 3 letters + 6 digits
      - '\b((?-i:[LU]\d{5}[A-Z]{2}\d{4}[A-Z]{3}\d{6}))\b'
      # generic structured record-id (uppercase prefix, hyphen, digits)
      - '\b((?-i:[A-Z]{2,6})-\d{3,}(?:-\d{1,6})*)\b'
    masking:
      strategy: redact
      format: "[TAX ID {n}]"

  - id: flight_number
    display_name: Flight Number
    description: "Airline flight number. Example: 'AI-442', 'BA-117', 'AA 100'. Detect near keyword: flight, flt."
    policy: [general]
    enabled: true
    priority: 2
    gliner_label: "airline flight number"
    patterns:
      - '(?:flight|flt\.?)\s+([A-Z]{2}[-\s]?\d{2,4})'
      # value-before-label: "AA 655 for flight number"
      - '\b([A-Z]{2}[-\s]?\d{2,4})\s+(?:for\s+)?(?:the\s+)?flight'
      # bare airline-coded flight (AA-123, AA 655, DL 4567)
      - '(?<![A-Za-z0-9])((?:AA|UA|DL|SW|WN|BA|LH|EK|AI|QR|SQ|CX|AF|AC|EY|TK|VS|FX|QF)[-\s]?\d{2,4})(?![A-Za-z0-9])'
      # Airline codes with digit in prefix: 6E345 (IndiGo), G81234
      - '(?<![A-Za-z0-9])([0-9][A-Z]\d{2,5}|[A-Z][0-9]\d{2,5})\b'
      # Underscore/slash separator: DL_4567, UA/890, 6E-345
      - '(?<![A-Za-z0-9])([A-Z]{2}[_/]\d{2,5})(?![A-Za-z0-9])'
      # Keyword + any code: "DOMESTIC FLIGHT-ID: 6E345", "CHARTER FLIGHT NUMBER: G81234"
      - '(?:DOMESTIC\s+FLIGHT[-\s]?ID|CHARTER\s+FLIGHT\s+(?:NUMBER|NO))\s*[:#]?\s*([A-Z0-9]{2}[-_/]?\d{2,5})\b'
    masking:
      strategy: redact
      format: "[FLIGHT NUMBER {n}]"

  - id: booking_reference
    display_name: Booking / Reservation Reference
    description: "Hotel, flight, or travel booking reference number. Example: 'BK-771922', 'PNR: ABC123'. Detect near keyword: booking reference, reservation, PNR."
    policy: [general]
    enabled: true
    priority: 2
    gliner_label: "booking or reservation reference"
    patterns:
      - '(?:BK|Booking\s+(?:Reference|Ref|ID|Number)|Reservation\s+(?:ID|Number)|PNR)\s*[-:#]?\s*([A-Za-z0-9\-]{4,15})'
      - '\b((?:BR|RES|PNR|TBI|FBR|TBN|TKR|APC|VBI|CBR|ERN|OBR|BTN|SBR|TCC|ABN)-\d{3,})\b'
      # BOOKING-112233 (full word prefix, beyond the {2,6} generic recognizer)
      - '\b(BOOKING-\d{3,})\b'
      # airline-style mixed alphanumeric PNR: LH9988XZ, AA12BC (letters-digits-letters)
      - '\b((?-i:[A-Z]{2}\d{2,4}[A-Z]{2,3}))\b'
      # bare 6-char PNR (ABC123) only in booking/reservation context (too generic standalone)
      - '(?:booking|reservation|PNR|confirmation)\s+(?:reference|ref|code|number|no\.?|id)?\s*[:#]?\s*((?-i:[A-Z]{3}\d{3}|[A-Z0-9]{6}))\b'
      # generic structured record-id (uppercase prefix, hyphen, digits)
      - '\b((?-i:[A-Z]{2,6})-\d{3,}(?:-\d{1,6})*)\b'
      # Travel portal booking codes: MAKEMYTRIP556677, CLEARTRIP123456
      - '\b((?:MAKEMYTRIP|CLEARTRIP|GOIBIBO|YATRA|EXPEDIA|ORBITZ|BOOKING)[A-Z0-9]{4,15})\b'
    masking:
      strategy: redact
      format: "[BOOKING ID {n}]"

  - id: claim_number
    display_name: Insurance Claim Number
    description: "Insurance claim number. Example: 'CLM-882901'. Detect near keyword: claim number, claim ID."
    policy: [general]
    enabled: true
    priority: 1
    gliner_label: "insurance claim number"
    patterns:
      - '(?:CLM|Claim\s+(?:Number|No|ID))\s*[-:#]?\s*([A-Za-z0-9\-]{4,15})'
      - '\b((?:CLM|ICN|MCI|HCN|BCI|PCN|ACI|TIC|DCN|HCI|CRN|SCI|GCN|AIC|CCI|WCC|FCR|SCN)-\d{4,})\b'
      # generic structured record-id (uppercase prefix, hyphen, digits)
      - '\b((?-i:[A-Z]{2,6})-\d{3,}(?:-\d{1,6})*)\b'
    masking:
      strategy: redact
      format: "[CLAIM ID {n}]"

  - id: application_id
    display_name: Government Application / Reference Number
    description: "Government or official application reference number. Example: 'GOV-551882', 'APP-12345'. Detect near keyword: application number, reference number, GOV."
    policy: [general]
    enabled: true
    priority: 1
    gliner_label: "application ID or government reference number"
    patterns:
      # Include full APP-XXXXXX token (prefix + number) in the capture group
      - '(\bAPP-[A-Za-z0-9\-]{4,15})\b'
      - '(\bGOV-[A-Za-z0-9\-]{4,15})\b'
      - '(?:Application\s+(?:Number|No|ID)|Reference\s+(?:Number|No|ID))\s*[-:#]?\s*([A-Za-z0-9\-]{4,15})'
      - '(?:Clinical\s+Trial\s+Participant\s+ID|Parking\s+Permit\s+(?:ID|Number))\s*[:#]?\s*([A-Za-z0-9\-]{4,15})'
      - '\bPP-\d{4,12}\b'
      - '\b((?:AID|AN|RAI|OAI|JAN|UAI|LAN|IAI|MAI|GAN|HAI|DSA|PAI|UAP|SAN|BAN)-\d{3,})\b'
      - '\b((?-i:[A-Z]{2,6})-\d{3,}(?:-\d{1,6})*)\b'
      - '\b((?-i:[A-Z]{2,8})\d{4,})\b'
      - '\b([a-z]{2,}(?:_[a-z]+)+_\d{3,})\b'
    masking:
      strategy: redact
      format: "[APPLICATION ID {n}]"

# ── Organisation subtypes (more specific than organization_name) ──────────────

  - id: hospital_name
    display_name: Hospital / Medical Center / Clinic Name
    description: "Name of a hospital, medical center, health system, clinic, or other healthcare facility. Example: 'Westside Medical Center', 'Valley Diagnostics Laboratory', 'Pacific Bay Medical Center'."
    policy: [hipaa]
    enabled: true
    # Group C: 1 → 3 — open-vocabulary NER entity. Beats person_name (4)
    # but loses to structured patterns and physician_name (2).
    priority: 3
    gliner_label: "hospital or medical center name"
    patterns:
      # Standard capitalized words (2-5) + medical suffix (handles "St. Mary's Hospital")
      - '\b((?:St\.[ \t]+)?(?:(?-i:[A-Z])[A-Za-z'']+[ \t]+){1,5}(?:Medical[ \t]+Center|Hospital|Health[ \t]+System|Clinic|Medical[ \t]+Group|Healthcare|Diagnostics?[ \t]+(?:Lab(?:oratory)?|Center)|Radiology[ \t]+(?:Center|Associates)|Medical[ \t]+Institute|Health[ \t]+Center|Health[ \t]+Group|Wellness[ \t]+Center|Oncology[ \t]+Center|Cancer[ \t]+Center|Surgery[ \t]+Center))\b'
      # Names with "and" or "&" connector: "Martinez and Sons Medical Center"
      - '\b((?:St\.[ \t]+)?(?:(?-i:[A-Z])[A-Za-z''\-]+[ \t]+){1,4}(?:and[ \t]+|&[ \t]+)?(?:(?-i:[A-Z])[A-Za-z''\-]+[ \t]+){0,3}(?:Medical[ \t]+Center|Hospital|Health[ \t]+System|Clinic|Medical[ \t]+Group|Healthcare|Medical[ \t]+Institute|Health[ \t]+Center|Health[ \t]+Group|Oncology[ \t]+Center))\b'
      # "Women's Health Clinic: Grace Women's Clinic"
      - '(?:Clinic|Center)\s*:\s*((?:(?-i:[A-Z])[\w'']+(?:\s+(?-i:[A-Z])[\w'']+){1,6})\s+Clinic)'
      - '(?:REHAB\s+CENTER-ID|Emergency\s+case\s+transferred\s+to|Therapy\s+sessions\s+ongoing\s+at|Dental\s+records\s+updated\s+from)\s*[:#]?\s*((?:(?-i:[A-Z])[A-Za-z'']+(?:\s+(?-i:[A-Z])[A-Za-z'']+){1,5})\s+(?:Center|Clinic|Hospital))'
    masking:
      strategy: redact
      format: "[HOSPITAL {n}]"

  - id: bank_name
    display_name: Bank / Financial Institution Name
    description: "Name of a bank, credit union, or financial institution. Example: 'City National Bank', 'Chase', 'Wells Fargo', 'Bank of America'."
    policy: [pci_dss]
    enabled: true
    priority: 3
    gliner_label: "bank or financial institution name"
    patterns:
      - '\b((?:(?-i:[A-Z])[A-Za-z]+[ \t]+){1,4}(?:Bank|Credit[ \t]+Union|Financial|Savings|Trust|Bancorp))\b'
      - '\b(Chase|Wells\s+Fargo|Citibank|Bank\s+of\s+America|HSBC|Barclays|TD\s+Bank|Capital\s+One|PNC|US\s+Bank|SunTrust|BB&T|Fidelity|Schwab|Vanguard)\b'
    masking:
      strategy: redact
      format: "[BANK {n}]"

  - id: insurance_company_name
    display_name: Insurance Company Name
    description: "Name of an insurance company or provider. Example: 'United Shield Insurance', 'Blue Cross Blue Shield', 'Aetna', 'UnitedHealth'. Do NOT flag phrases like 'her insurance', 'his insurance', 'their insurance', 'the insurance', 'my insurance'. Must be a proper company name."
    policy: [general]
    enabled: true
    priority: 3
    confidence_threshold: 0.92
    gliner_label: "insurance company proper name like Aetna Blue Cross Cigna Humana"
    patterns:
      # Require 2+ proper-noun words before Insurance keyword to avoid "Her insurance", "His insurance"
      - '\b((?:(?-i:[A-Z])[A-Za-z]+[ \t]+){2,4}(?:Insurance|Ins\.|Assurance|Mutual|Underwriters?))\b'
      # Well-known insurers by name
      - '\b(Aetna|UnitedHealth(?:care)?|Cigna|Humana|Anthem|Blue\s+Cross(?:\s+Blue\s+Shield)?|Blue\s+Shield|Kaiser(?:\s+Permanente)?|Molina|Centene|MetLife|Prudential|Allstate|State\s+Farm|GEICO|Progressive|Travelers|BlueCross|BCBS)\b'
    masking:
      strategy: redact
      format: "[INSURANCE COMPANY {n}]"

  - id: university_name
    display_name: University / College Name
    description: "Name of a university, college, or academic institution. Example: 'Northern State University', 'MIT', 'Harvard University'."
    policy: [general]
    enabled: true
    priority: 3
    gliner_label: "university or college name"
    patterns:
      - '\b((?:(?-i:[A-Z])[A-Za-z]+[ \t]+){1,5}(?:University|College|Institute[ \t]+of[ \t]+Technology|School[ \t]+of|Academy))\b'
    masking:
      strategy: redact
      format: "[UNIVERSITY {n}]"

  - id: law_firm_name
    display_name: Law Firm / Legal Practice Name
    description: "Name of a law firm, legal practice, or attorney's office. Example: 'Grant & Associates', 'Smith & Jones LLP'."
    policy: [general]
    enabled: true
    priority: 3
    gliner_label: "law firm name"
    patterns:
      - '\b((?-i:[A-Z])[A-Za-z]*(?:[ \t]+(?:&[ \t]+)?(?-i:[A-Z])[A-Za-z]*){0,4}[ \t]+(?:LLP|LLC|Law[ \t]+(?:Firm|Group|Office|Practice)|Attorneys?[ \t]+at[ \t]+Law|&[ \t]+Associates))\b'
      # Big Law firm names (GAP-17)
      - '\b(Skadden(?:,\s*Arps)?(?:\s+LLP)?|Davis\s+Polk(?:\s*&\s*Wardwell)?(?:\s+LLP)?|Gibson\s+Dunn(?:\s*&\s*Crutcher)?(?:\s+LLP)?|Sullivan\s*&\s*Cromwell(?:\s+LLP)?|Wachtell(?:,\s*Lipton)?(?:\s+LLP)?|Kirkland\s*&\s*Ellis(?:\s+LLP)?|Latham\s*&\s*Watkins(?:\s+LLP)?|Jones\s+Day|Debevoise\s*&\s*Plimpton(?:\s+LLP)?|Cleary\s+Gottlieb(?:\s+LLP)?|Cravath(?:,\s*Swaine)?(?:\s+LLP)?|Paul\s+Weiss(?:,\s*Rifkind)?(?:\s+LLP)?|Simpson\s+Thacher(?:\s*&\s*Bartlett)?(?:\s+LLP)?|White\s*&\s*Case(?:\s+LLP)?|Willkie\s+Farr(?:\s*&\s*Gallagher)?(?:\s+LLP)?)\b'
    masking:
      strategy: redact
      format: "[LAW FIRM {n}]"

  - id: court_name
    display_name: Court / Judicial Body Name
    description: "Name of a court or judicial body. Example: 'California Superior Court', 'US District Court', 'Family Court'."
    policy: [general]
    enabled: true
    priority: 3
    gliner_label: "court name"
    patterns:
      - '\b((?:(?-i:[A-Z])[A-Za-z]+[ \t]+){1,4}(?:Superior[ \t]+Court|District[ \t]+Court|Circuit[ \t]+Court|Court[ \t]+of[ \t]+Appeals?|Supreme[ \t]+Court|Family[ \t]+Court|Municipal[ \t]+Court|Probate[ \t]+Court))\b'
    masking:
      strategy: redact
      format: "[COURT {n}]"

  - id: hotel_name
    display_name: Hotel / Accommodation Name
    description: "Name of a hotel, resort, or accommodation. Example: 'Grand Royal Hotel', 'Marriott Downtown', 'Hilton Garden Inn'."
    policy: [general]
    enabled: true
    priority: 3
    gliner_label: "hotel or accommodation name"
    patterns:
      # Standard: 1-4 capitalized words + hotel suffix
      - '\b((?:(?-i:[A-Z])[A-Za-z]+[ \t]+){1,4}(?:Hotel|Resort|Inn|Suites?|Lodge|Motel|Hostel|Bed[ \t]+and[ \t]+Breakfast))\b'
      # With comma/and connectors: "Morse, Gonzales and Harrison Hotel"
      - '\b((?:(?-i:[A-Z])[A-Za-z]+(?:[,]?[ \t]+(?:and[ \t]+)?)?){2,6}(?:Hotel|Resort|Inn|Suites?|Lodge|Motel))\b'
      - '\b(Marriott|Hilton|Hyatt|Sheraton|Westin|IHG|Holiday\s+Inn|Best\s+Western|Radisson|Ritz[-\s]Carlton|Four\s+Seasons|Starwood)\b'
    masking:
      strategy: redact
      format: "[HOTEL {n}]"
