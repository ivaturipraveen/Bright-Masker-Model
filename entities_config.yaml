  - (?:Fingerprint\s+(?:Number|ID|Auth\s+No|Reference|Code|Hash|Template|Capture\s+ID|Scan\s+ID|Biometric\s+ID|Verification\s+Code|Vector\s+Code|Match\s+ID|Pattern\s+ID)|Palm\s+Print\s+(?:ID|Reference|Number)|Biometric\s+Fingerprint|Touch\s+ID\s+Reference|Fingerprint\s+Authentication|Latent\s+Fingerprint|Friction\s+Ridge\s+ID)\s*[:#]?\s*([A-Za-z0-9\-]{4,20})
  - \bFP\s+AUTH\s+NO\s*[:#]?\s*([A-Z]{2,5}-\d{4,12})
  - (?:FINGERPRINT\s+ID|FP\s+AUTH\s+NO|FINGERPRINT\s+NUMBER|PALM\s+PRINT\s+ID)\s*[:#]?\s*([A-Z0-9][A-Z0-9\-]{3,19})
  - (?:Fingerprint\s+Hash|Biometric\s+Hash)\s*[:#]?\s*([0-9A-Fa-f]{16,64})\b
