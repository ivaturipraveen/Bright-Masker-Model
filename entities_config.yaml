- id: organization_name
  display_name: Company / Organization / Government Body / Foundation Name
  description: 'Company, business, nonprofit, government agency, or organization name. Examples: ''OpenAI Technologies'', ''Bright Future Solutions'', ''Helping Hands Foundation'', ''Department of Public
    Services'', ''Tata Consultancy Services''. Do NOT flag city names, state names, country names, or geographic locations on their own.'
  policy:
  - hipaa
  enabled: true
  priority: 4
  confidence_threshold: 0.55
  gliner_label: company or organization name
  presidio_type: ORGANIZATION
  patterns:
  - ^([A-Z][A-Z ,&.]{5,},?\s*INC\.?)$
  - ^([A-Z][A-Z ,&.]{5,}\s+LLC\.?)$
  - ^([A-Z][A-Z ,&.]{5,}\s+(?:CORP(?:ORATION)?|LTD)\.?)$
  - ^([A-Z][A-Z &.]{5,}\s+(?:CITY\s+)?(?:GENERAL\s+)?(?:MEMORIAL\s+)?HOSPITAL)$
  - ^([A-Z][A-Z &.]{5,}\s+HEALTH\s+SYSTEM)$
  - ^([A-Z][A-Z &.]{5,}\s+MEDICAL\s+CENTER)$
  - ^([A-Z][A-Z &.]{5,}\s+(?:PATHOLOGY|DIAGNOSTIC|RADIOLOGY)\s+(?:ASSOCIATES|CLINIC|CENTER))$
  - \b((?:(?-i:[A-Z])[A-Za-z]+[ \t]+){1,4}(?:Memorial(?:[ \t]+Hospital)?|Medical[ \t]+Center|General[ \t]+Hospital|Health[ \t]+System|University[ \t]+Hospital))\b
  - \b((?:(?-i:[A-Z])[A-Za-z0-9&]+)(?:\s+(?-i:[A-Z])[A-Za-z0-9&]+){0,3}\s+(?:Inc\.?|LLC\.?|Corp\.?|Corporation|Ltd\.?|Co\.?))\b
  masking:
    strategy: redact
    format: '[COMPANY {n}]'
- id: signature
  display_name: Signature
  description: Electronic or physical signature reference
  policy:
  - hipaa
  enabled: true
  priority: 2
  gliner_label: electronic or physical signature
  patterns:
  - \b((?:SIG|BIO-SIGN|DOCSIGN|REGSIG|AST|PKI|ENC-SIGN|SDS|E-SIGN|DSIG)-[A-Za-z0-9]{4,16})\b
  - (/s/\s+(?-i:[A-Z])[a-zA-Z]+(?:\s+(?-i:[A-Z])\.?[a-zA-Z]*)+)
  - (?:Secure\s+Signature\s+ID|Biometric\s+Signature|Document\s+Signature|Registered\s+Signature|Digital\s+Signature|Electronic\s+Signature|Authenticated\s+Signature\s+Token|PKI\s+Digital\s+Signature|Encrypted\s+Signature\s+ID|Secure\s+Document\s+Sign[-\s]Off)\s*[:#]?\s*((?:/s/\s+)?[A-Za-z0-9_\-/]{3,40}(?:\s+[A-Za-z0-9_\-/]{2,20})?)
  - \b((?-i:[A-Z])[a-zA-Z]+(?:[._](?-i:[A-Z])?[a-zA-Z]+)*_[Ss]ign)\b
  - (?:Signature|Sign|signed|s/)\s*[:#]?\s*((?-i:[A-Z])\.(?-i:[A-Z])[a-zA-Z]+)\b
  - (?:Signature|Sign|signed|s/)\s*[:#]?\s*((?-i:[A-Z])\.\s+(?-i:[A-Z])[a-zA-Z]+)\b
  - (?:\bDIGITAL\s+SIGNATURE[-\s]?ID\b|\bBIOMETRIC\s+SIGN(?:#|\b)|\bDOC\s+SIGNATURE(?:#|\b)|\bREGISTERED\s+SIGN[-\s]?ID\b|\bE-SIGNATURE[-\s]?ID\b)\s*[:#]?\s*([A-Za-z0-9_\-/][A-Za-z0-9_\-/]{2,29})
  - \b((?:SIG|BIO-SIGN|DSIG|PKI)-(?:19|20)\d{2}-\d{2,6})\b
  masking:
    strategy: redact
    format: '[SIGNATURE {n}]'
- id: credit_card_number
  display_name: Credit / Debit Card Number (PAN)
  description: 'Primary Account Number (PAN). Example: 4111 1111 1111 1111'
  policy:
  - pci_dss
  enabled: true
  priority: 1
  gliner_label: credit or debit card number
  presidio_type: CREDIT_CARD
  patterns:
  - \b(\d{4}[-\s]\d{4}[-\s]\d{4}[-\s]\d{4})\b
  - \b(\d{8}\s+\d{4}\s+\d{4})\b
  - \b(\d{4}[-\s]\d{6}[-\s]\d{5})\b
  - \b(\d{4}[-\s]\d{4}[-\s]\d{4}[-\s]\d{1})\b
  - \b(\d{4}[-\s]\d{4}[-\s]\d{4}[-\s]\d{2})\b
  - (?<!\d)(4\d{15})(?!\d)
  - (?<!\d)(5[1-5]\d{14})(?!\d)
  - (?:Bank\s+Card\s+Number|Corporate\s+Card\s+Number)\s*[:#]?\s*(\d{4}(?:[-\s]\d{4}){2,3}[-\s]?\d{1,4})
  masking:
    strategy: redact
    format: '[CARD NUMBER {n}]'
- id: card_holder_name
  display_name: Card Holder Name
  description: Name physically printed on a credit or debit card — detected via GLiNER when contextually adjacent to card data.
  policy:
  - pci_dss
  enabled: true
  priority: 2
  confidence_threshold: 0.5
  gliner_label: cardholder name on payment card
  masking:
    strategy: redact
    format: '[CARD HOLDER {n}]'
- id: card_expiration_date
  display_name: Card Expiry MM/YY (two-digit year, no day)
  description: Credit/debit card expiry date in MM/YY, MM-YY, MM/YYYY, or MM-YYYY format. Exactly 2 digits month + (2 or 4) digits year. NEVER flag 3-part dates with a day and 4-digit year like '03/14/2025'
    — those are clinical dates.
  policy:
  - pci_dss
  enabled: true
  priority: 1
  gliner_label: card expiration date
  patterns:
  - (?:Expir(?:y|ation)(?:\s+Date)?|Card\s+Expir(?:y|ation)(?:\s+Date)?|Valid\s+(?:Through|Thru|Until)|Card\s+Valid\s+(?:Through|Thru|Until)|Credit\s+Card\s+Expir(?:y|ation)|Card\s+Validity\s+Date|EMV\s+Card\s+Expiry|Bank\s+Card\s+Expir(?:y|ation)(?:\s+Date)?|Secure\s+Card\s+Exp\s+Date|Membership\s+Card\s+Expiry|Corporate\s+Card\s+Valid\s+Thru|Prepaid\s+Card\s+Expir(?:y|ation)|Card\s+Exp(?:iry)?(?:\s+Date)?|Exp(?:iration|iry)?(?:\s+Date)?)\s*[:#]?\s*((?:0[1-9]|1[0-2])[/\-](?:\d{2}|(?:19|20)\d{2}))\b
  - (?:EXPIRES|VALID\s+THRU|VALID\s+UNTIL|VALID\s+THRU#?|VALID\s+UNTIL#?|EXPIRY#?|CARD\s+EXP[-\s]?ID|CARD\s+VALIDITY[-\s]?ID|EMV\s+EXP\s+DATE#?|BANK\s+CARD\s+EXPIRY|MM/YY|MM-YYYY|MM/YYYY|MM-YY)\s*[:#]?\s*((?:0[1-9]|1[0-2])[/\-](?:\d{2}|(?:19|20)\d{2}))\b
  - (?:card|valid|expir|expiry|expiration)\s+(?:thru|until|date|exp|expires)?\s*[:#]?\s*((?:0[1-9]|1[0-2])[/\-]\d{2})(?!\d)
  - (?<!\d)((?:0[1-9]|1[0-2])[/](?:20\d{2}))(?!\d)
  - (?:Expir(?:y|ation)|Valid\s+(?:Through|Thru|Until)|Card\s+Exp|EXPIRES|EXPIRY)\s*[:#]?\s*((?:0[1-9]|1[0-2])[-](?:[2-9]\d))(?!\d)
  - (?<!\d)((?:0[1-9]|1[0-2])[/](?:2[4-9]|3[0-9]))(?!\d)
  - (?<!\d)((?:0[1-9]|1[0-2])[-](?:2[4-9]|3[0-9]))(?!\d)
  masking:
    strategy: redact
    format: '[CARD EXP {n}]'
- id: card_service_code
  display_name: Card Service Code / CVV / CVC
  description: 'Card verification value or magstripe service code — the 3 or 4 digit security code on a payment card, or the 3-digit Track 1/2 service code. Detect ONLY near explicit keywords: CVV, CVC,
    CVV2, CAV2, CID, Security Code, Service Code, Magstripe/EMV/Track/ATM/POS Service Code, plus the compact prefixes SC, MSC, TRK, EMV, AUTH, PAY, CARDSC. Do NOT tag amounts, dates, case numbers, or any
    other 3-4 digit values without these keywords.'
  policy:
  - pci_dss
  enabled: true
  priority: 1
  confidence_threshold: 0.95
  gliner_label: CVV card security code 3 digit verification value
  patterns:
  - CVV2?\s*[:#]?\s*(\d{3,4})
  - CVC\s*[:#]?\s*(\d{3,4})
  - CAV2?\s*[:#]?\s*(\d{3,4})
  - CID\s*[:#]?\s*(\d{3,4})
  - Security\s+Code\s*[:#]?\s*(\d{3,4})
  - Card\s+Service\s+Code\s*[:#]?\s*(\d{3})
  - (?:Service\s+Code|Magstripe\s+Service\s+Code|EMV\s+Service\s+Code|Track\s*[12]\s+Service\s+Code|Card\s+Authorization\s+Service\s+Code|ATM\s+Service\s+Code|POS\s+Service\s+Code|Issuer\s+Service\s+Code|Card\s+Validation\s+Service\s+Code|Secure\s+Payment\s+Service\s+Code|Transaction\s+Service\s+Code|Financial\s+Service\s+Code|Bank\s+Service\s+Code)\s*[:#]?\s*(\d{3})\b
  - (?:SERVICE\s+CODE|CARD\s+SERVICE#?|EMV\s+SERVICE[-\s]?ID|TRACK\s*[12]\s+SERVICE#?|BANK\s+SERVICE\s+CODE|ATM\s+SERVICE[-\s]?ID|POS\s+SERVICE#?|ISSUER\s+SERVICE[-\s]?ID)\s*[:#]?\s*(\d{3})\b
  - \b((?:SC|MSC|TRK[12]?|EMV|ATM|POS|AUTH|PAY|CARDSC)-?\d{3})\b
  - (?:card\s+service\s+code|service\s+code)\s+is\s+(\d{3})\b
  masking:
    strategy: redact
    format: '[CVV {n}]'
- id: card_track_data
  display_name: Card Track Data (Magnetic Stripe)
  description: Full magnetic stripe track data. Track 1 starts with %B followed by PAN and cardholder name. Track 2 starts with semicolon followed by PAN. PCI-DSS SAD.
  policy:
  - pci_dss
  enabled: true
  priority: 1
  gliner_label: card magnetic stripe track data
  patterns:
  - (%B[\d\.]{6,19}\^[^\^]{1,26}\^\d{4}[^\?]*\?)
  - (;\d{13,19}=\d{4}[^?]*\?)
  masking:
    strategy: redact
    format: '[CARD TRACK {n}]'
- id: card_pin
  display_name: Card PIN / PIN Block
  description: 'Payment card PIN or encrypted PIN block. Flag the value near keyword: PIN, PIN Block, MPIN, TPIN, SECURECODE, PAYCODE, AUTHCODE. PCI-DSS SAD.'
  policy:
  - pci_dss
  enabled: true
  priority: 1
  confidence_threshold: 0.7
  gliner_label: card PIN or PIN block
  patterns:
  - \bPIN\s+Block\s*[:#]?\s*([A-Fa-f0-9]{16,})\b
  - \bPIN\s*[:#]\s*(\d{4,6})\b
  - \bPIN\s+(\d{4,6})\b
  - \b(?:card\s+)?PIN\s+(?:is|was|=)\s+(\d{4,8})\b
  - (?:PIN\s+(?:Number|Code|No)|(?:Secure|POS|Account|ATM|Card|Bank|Auth)\s+PIN(?:\s+(?:Code|Number|No))?)\s*[:#]?\s*(\d{4,8})\b
  - (?:PIN\s+NO|CARD\s+PIN#?|ATM\s+PIN[-\s]?ID|SECURE\s+PIN#?|BANK\s+PIN\s+NO|AUTH\s+PIN[-\s]?ID|POS\s+PIN#?)\s*[:#]?\s*(\d{4,8})\b
  - \b(?:MPIN|TPIN|SECURECODE|PAYCODE|AUTHCODE)\s*[:#=]?\s*(\d{4,8})\b
  masking:
    strategy: redact
    format: '[CARD PIN {n}]'
- id: card_cryptogram
  display_name: Card Cryptogram / Dynamic Auth Value
  description: 'EMV chip cryptogram or dynamic authentication value generated per-transaction. Detect near keywords: Cryptogram, ARQC, TC, AAC, Dynamic Auth.'
  policy:
  - pci_dss
  enabled: true
  priority: 1
  gliner_label: card transaction cryptogram ARQC
  patterns:
  - (\bARQC[-:#]?\s*[A-Za-z0-9]{2,16})\b
  - \b(TC-\d{2,10})\b
  - (?:AAC|Cryptogram|Dynamic\s+Auth(?:entication)?(?:\s+Value)?)\s*[-:#]?\s*([A-Fa-f0-9]{4,16})\b
  - \b((?:AC|AUTH|PAY|DCC|SEMV|CVCG|CHIP|IAC|TSC|OPC|POSC|CAC|ESV|DPC|CSC|STT|EMV-AC|AAC|ARPC|CVN|EMVTOKEN|DYNCRYPTO)-[A-Za-z0-9]{4,12})\b
  - (?:Application\s+Cryptogram|Authorization\s+Cryptogram|Payment\s+Cryptogram|Dynamic\s+Card\s+Cryptogram|Secure\s+EMV\s+Token|Card\s+Verification\s+Cryptogram|Chip\s+Card\s+Cryptogram|Issuer\s+Authentication\s+Cryptogram|Transaction\s+Security\s+Cryptogram|Online\s+Payment\s+Cryptogram|POS\s+Cryptogram\s+Number|Card\s+Authentication\s+Code|EMV\s+Security\s+Value|Digital\s+Payment\s+Cryptogram|Secure\s+Transaction\s+Token|Card\s+Cryptogram|EMV\s+Cryptogram)\s*[:#]?\s*([A-Z0-9][A-Z0-9\-]{3,19})
  - (?:CARD\s+CRYPTOGRAM#?|EMV\s+CRYPTOGRAM[-\s]?ID|ARQC#?|AUTH\s+CRYPTOGRAM\s+NO|PAYMENT\s+CRYPTOGRAM[-\s]?ID|CHIP\s+CRYPTOGRAM#?|SECURE\s+TOKEN[-\s]?ID|POS\s+CRYPTOGRAM#?|EMV\s+SECURITY\s+VALUE)\s*[:#]?\s*([A-Z0-9][A-Z0-9\-]{3,19})
  - (?:Cryptogram|ARQC|TC|AAC|EMV|Card\s+Cryptogram|Application\s+Cryptogram)\s*(?:is|=)?\s*[:#]?\s*\b([A-Fa-f0-9]{8})\b
  - ^\s*\b([A-Fa-f0-9]{8})\b\s*$
  masking:
    strategy: redact
    format: '[CRYPTOGRAM {n}]'
- id: card_iin_bin
  display_name: Card IIN / BIN (Issuer Identification Number)
  description: 'Issuer Identification Number — first 6-8 digits of a PAN. PCI-DSS protected when stored separately. Detect near keywords: IIN, BIN, Issuer Number.'
  policy:
  - pci_dss
  enabled: true
  gliner_label: card BIN or IIN issuer number
  priority: 2
  patterns:
  - (?:IIN|BIN|Issuer\s+(?:Identification\s+)?Number)\s*[:#]?\s*(\d{6,8})\b
  - (?:Visa\s+BIN|Merchant\s+BIN|Card\s+BIN|IIN\s+Number|Issuer\s+BIN|Payment\s+BIN|EMV\s+BIN|BIN\s+Number|Issuer\s+Code)\s*(?:Number)?\s*[:#]?\s*(\d{6,8})\b
  - (?:IIN\s+NO|CARD\s+BIN#?|PAYMENT\s+BIN[-\s]?ID|EMV\s+BIN#?)\s*[:#]?\s*(\d{6,8})\b
  - (?:CARDPREFIX|ISSUERCODE|BANKBIN|PAYMENTPREFIX)[-](\d{6,8})\b
  masking:
    strategy: redact
    format: '[IIN {n}]'
- id: bank_account_number
  display_name: Bank Account Number
  description: 'Detect based on keyword: Bank Account Number, Account Number, Checking Account, Savings Account'
  policy:
  - pci_dss
  - hipaa
  enabled: true
  priority: 1
  gliner_label: bank account number
  presidio_type: US_BANK_NUMBER
  patterns:
  - (?:ACC(?:OUNT)?\s*(?:NO|NUMBER|#)|A\/C#?|Bank\s+account\s+number)\s*[:#]?\s*([\d\- ]{8,22})
  - (?:Checking|Savings)\s+Account\s*[:#]?\s*([\d\- ]{8,22})
  - (?:Account\s+Number)\s*[:#]?\s*([\d\- ]{8,22})
  - \bACC(?:OUNT)?\s*(?:NO|NUMBER|#|No)?\.?\s*[:#]?\s*((?:\d[\d\s\-]{6,20}\d))\b
  - \bA\s*/\s*C\s*#?\s*[:#]?\s*((?:\d[\d\s\-]{6,20}\d))\b
  - Bank\s+account\s+number\s*[:#]?\s*((?:\d{2,4}[\s\-]+){2,5}\d{2,6})
  - (?:Account|ACC|A/C)\s*\S{0,3}\s*((?:\d{4}[\s\-]+){2,3}\d{4})\b
  - (?:Beneficiary\s+Account|Payee\s+Account|Customer\s+Account)\s*(?:Number|No)?\s*[:#]?\s*([\d\- ]{8,22})
  masking:
    strategy: redact
    format: '[BANK ACCOUNT {n}]'
- id: bank_routing_number
  display_name: Bank Routing Number
  description: 'Flag only the 9-digit numeric value (e.g. 021000021) near keywords: Routing Number, ABA Number. NOT the label ''Routing Number'' itself.'
  policy:
  - pci_dss
  - hipaa
  enabled: true
  priority: 1
  gliner_label: bank routing number
  patterns:
  - Routing\s+(?:Number|No)\s*[:#]?\s*(\d{9})
  - ABA\s*(?:Number|No|#)?\s*[:#]?\s*(\d{9})
  - RTN\s*[:#]?\s*(\d{9})
  - Bank\s+Transit\s+Number\s*[:#]?\s*(\d{9})
  - Customer\s+provided\s+RTN\s+(\d{9})
  - (?:routing|RTN)\s+(\d{9})\b
  - \bABA\s*#\s*(\d{9})\b
  - (?:Bank\s+Transit|Wire\s+Transit|Fedwire(?:\s+Routing)?|ACH\s+Routing)\s*(?:Number|No|#)?\s*[:#]?\s*(\d{9})\b
  - \b(ABA-\d{9})\b
  - (?:wire\s+to|deposit\s+to|transfer\s+to)\s+(?:routing|RTN|ABA)\s*[:#]?\s*(\d{9})\b
  - (?<!\d)([0-3]\d{8})(?!\d)
  masking:
    strategy: redact
    format: '[ROUTING NUMBER {n}]'
- id: iban
  display_name: IBAN
  description: Flag only the actual IBAN value starting with 2-letter country code + digits (e.g. GB29NWBK60161331926819). NOT the label word 'IBAN' itself.
  policy:
  - pci_dss
  - hipaa
  enabled: true
  priority: 1
  gliner_label: IBAN international bank account number
  presidio_type: IBAN_CODE
  patterns:
  - \b([A-Z]{2}\d{2}[A-Z0-9]{11,30})\b
  masking:
    strategy: redact
    format: '[IBAN {n}]'
- id: swift_bic_code
  display_name: SWIFT / BIC Code
  description: 'SWIFT Bank Identifier Code (8 or 11 chars: 4 bank code + 2 country + 2 location + optional 3 branch). Example: CHASUS33, BNPAFRPPPAR. Detect near keywords: SWIFT, BIC, SWIFT Code, BIC Code.'
  policy:
  - pci_dss
  enabled: true
  priority: 1
  gliner_label: SWIFT BIC code
  patterns:
  - \b(?:SWIFT|BIC)\b\s*(?:Code)?\s*[:#]?\s*([A-Z]{4}[A-Z]{2}[A-Z0-9]{2}(?:[A-Z0-9]{3})?)\b
  - (?:SWIFT|BIC)\s+(?:code\s+)?(?:is\s+)?([A-Z]{4}[A-Z]{2}[A-Z0-9]{2}(?:[A-Z0-9]{3})?)\b
  - \b([A-Z]{4}[A-Z]{2}[A-Z0-9]{2,5})\s+(?:for\s+)?(?:the\s+)?(?:swift|BIC)
  - (?<![A-Za-z0-9])([A-Z]{6}\d[A-Z0-9]{1,3})(?![A-Za-z0-9])
  - (?<![A-Za-z0-9])([A-Z]{4}[A-Z]{2}[A-Z0-9]{2}(?:[A-Z0-9]{3})?)(?![A-Za-z0-9])
  - (?:Bank|SWIFT|BIC|Wire|Transfer)\s+Code\s*[:#]?\s*([A-Z]{4}[A-Z]{2}[A-Z0-9]{2}(?:[A-Z0-9]{3})?)\b
  - (?:SWIFT[/\-]BIC|BIC[-\s]?ID|SWIFT[-\s]?ID|GLOBAL\s+BIC#?)\s*[:#]?\s*([A-Z]{4}[A-Z]{2}[A-Z0-9]{2}(?:[A-Z0-9]{3})?)\b
  masking:
    strategy: redact
    format: '[SWIFT {n}]'
- id: merchant_id
  display_name: Merchant ID (MID)
  description: 'Merchant identifier assigned by the payment processor. Detect near keyword: Merchant ID, MID. Example: MID-88234001. Capture the full token including MID- prefix.'
  policy:
  - pci_dss
  enabled: true
  priority: 4
  gliner_label: merchant ID MID
  patterns:
  - (?:Merchant\s+ID|Merchant)\s*[:#]?\s*(MID-[A-Za-z0-9]{2,12})\b
  - \b(MID-[A-Za-z0-9]{2,12})\b
  masking:
    strategy: redact
    format: '[MERCHANT ID {n}]'
- id: terminal_id
  display_name: Terminal ID (TID)
  description: 'POS terminal identifier assigned by the acquirer. Detect near keyword: Terminal ID, TID. Example: TID-44120099. Capture the full token including TID- prefix.'
  policy:
  - pci_dss
  enabled: true
  priority: 4
  gliner_label: terminal ID TID
  patterns:
  - (?:Terminal\s+ID|Terminal)\s*[:#]?\s*(TID-[A-Za-z0-9]{2,12})\b
  - \b(TID-[A-Za-z0-9]{2,12})\b
  - \b((?:POS|PTN|ATM|MTI|CRT|RTI|CTI|BTI|DPT|STI|STN|EMV|WTI|SST|KTN|FTI|GTI|CPT|TERM|TTN)-\d{3,})\b
  masking:
    strategy: redact
    format: '[TERMINAL ID {n}]'
- id: transaction_id
  display_name: Transaction ID
  description: 'Payment transaction identifier. Detect near keyword: Transaction ID, TXN, Transaction No. Example: TXN-20240508-00123'
  policy:
  - pci_dss
  enabled: true
  priority: 2
  gliner_label: transaction ID
  patterns:
  - (?:Transaction\s+(?:ID|No)|TXN)\s*[:#]?\s*([A-Za-z0-9\-]{4,30})\b
  - (?:Payment\s+Authorization\s+ID)\s*[:#]?\s*(PAY-[A-Za-z0-9\-]{4,20})\b
  - \b(stripe_pi_[A-Za-z0-9]{4,50}|stripe_ch_[A-Za-z0-9]{4,50}|stripe_in_[A-Za-z0-9]{4,50})\b
  masking:
    strategy: redact
    format: '[TRANSACTION ID {n}]'
- id: password
  display_name: Password
  description: User passwords, PINs, passphrases, and secret keys
  policy:
  - general
  enabled: true
  priority: 1
  gliner_label: password or secret passphrase
  patterns:
  - (?:password|passwd|pwd|pass)\s*[:#=]\s*([^\s,;.]{4,128})
  - (?:password|passwd|pwd)\s+([A-Za-z0-9!@#$%^&*_\-\.]{4,128})
  - (?:passphrase|secret[\s_]key)\s*[:#=\s]\s*([^\s,;.]{4,128})
  - \b([A-Za-z0-9][A-Za-z0-9!@#$%^&*_\-\.]{3,127})\s+(?:for|as)\s+(?:the\s+)?(?:password|passphrase|pin|passcode)\b
  - (?:LOGIN\s+PASS#?|ADMIN\s+PASS#?|RESET\s+PASS#?|TEMP\s+PASSWORD[-\s]?ID|SYS\s+PASS#?)\s*[:#]?\s*([^\s,;.]{4,128})
  - \b((?:ldap|vpn|db|aws|azure|k8s|serviceAcct|prodAdmin|internalAuth|k8sCluster|awsSecret|azureLogin)[_]?[A-Za-z0-9@#$!_]{3,30})\b
  - \b([A-Z][a-z]{2,10}[@#$!][0-9]{4}[A-Za-z0-9!@#$]{0,15})\b
  - \b([A-Z][a-z]{2,10}[@#$!][A-Za-z0-9]{3,10})\b
  - \b([A-Za-z]{2,10}[0-9]{2,4}[!@#$%&*][A-Za-z0-9]{0,10})\b
  - \b([A-Za-z]{3,15}[@#$!%][A-Za-z0-9!@#$]{3,20})\b
  - \b([A-Za-z][!@#$%^&*][a-zA-Z0-9!@#$%^&*]{5,25})\b
  - \b([A-Za-z]{4,20}[!@#$%^&*][A-Za-z0-9]{1,10})\b
  masking:
    strategy: redact
    format: '[PASSWORD {n}]'
- id: username
  display_name: Username / User ID
  description: 'Detect based on keyword: username, userid, user id, login. Only flag when contextually tied to a password or authentication context'
  policy:
  - general
  enabled: true
  priority: 1
  gliner_label: username or login ID
  patterns:
  - (?:username|user[\s_]id|userid|login)\s*[:#=]\s*(\S{1,64})
  - (?:username|userid)\s+(\S{1,64})
  - \b(user_[a-z][a-z0-9_]{2,30})\b
  - (?:portal\s+username|username\s+email)\s+is\s+([a-zA-Z0-9][a-zA-Z0-9._@-]{2,64})\b
  - (?:system\s+account|account\s+name|login\s+(?:name|id)|staff\s+account|user\s+account)\s*[:#=]\s*([a-zA-Z0-9][a-zA-Z0-9._@\-]{1,40})\b
  - \b((?:admin|root|service|ldap|vpn|prod|db|aws|azure|k8s|internal|svc|system|portal|dr)[_.][\w.]{2,30})\b
  - \b([a-z][a-z0-9]{1,14}\.[a-z][a-z0-9]{1,20}(?:\.[a-z0-9]{1,20})?)\b
  - \b([a-z][a-z0-9]{1,14}_[a-z][a-z0-9]{1,20})\b
  - \b([a-zA-Z]{2,12}[A-Z][a-z0-9]{1,10}\d{2,4})\b
  masking:
    strategy: redact
    format: '[USERNAME {n}]'
- id: confidential
  display_name: Confidential Data
  description: 'Content explicitly marked as sensitive. Detect based on keyword: CONFIDENTIAL, SENSITIVE, TOP SECRET, RESTRICTED'
  policy:
  - general
  enabled: true
  priority: 1
  confidence_threshold: 0.95
  gliner_label: confidential or top secret information
  patterns:
  - (?-i:\b(CONFIDENTIAL|TOP\s+SECRET|RESTRICTED|SENSITIVE\s+PII)\b)
  - ((?-i:Confidential)\s+(?:memo|document|file|record|report)\s+[A-Z]{1,4}-\d{4,10})
  - (?-i:\b(HIGHLY\s+CONFIDENTIAL|STRICTLY\s+CONFIDENTIAL|PRIVATE\s+(?:&|AND)\s+CONFIDENTIAL|INTERNAL\s+USE\s+ONLY|RESTRICTED\s+ACCESS|CLASSIFIED|SENSITIVE\s+INFORMATION|PROPRIETARY|EYES\s+ONLY|DO\s+NOT\s+DISTRIBUTE)\b)
  - \b(Highly\s+Confidential|Strictly\s+Confidential|Company\s+Confidential|Private\s+(?:&|and)\s+Confidential|Attorney[-\s]Client\s+Privileged|Non[-\s]Public\s+Information|Privileged\s+Communication|Proprietary\s+Information|Trade\s+Secret\s+Material)\b
  - \b(CUI(?:\s+\([^)]{3,50}\))?|HIPAA\s+Protected\s+Information|PCI\s+Sensitive\s+Data|GDPR\s+Restricted\s+Data)\b
  - \b(Confidential(?:\s+(?:Memo|Document|File|Record|Report|Case\s+File|Information))?)\b
  - \b(Private\s+Information|Sensitive\s+Data|Restricted\s+Access(?:\s+File)?|Classified\s+Information|Protected\s+Document|Secret\s+Record|Secure\s+Information|Sensitive\s+Report|Restricted\s+Financial\s+Data)\b
  - \b(Non-Public\s+Information|Privileged\s+Communication|Sensitive\s+data\s+related\s+to|Restricted\s+access\s+file|Internal\s+use\s+only|Privileged\s+communication)\b
  - \b(For\s+Authorized\s+Personnel\s+Only|Do\s+Not\s+Distribute|Eyes\s+Only)\b
  masking:
    strategy: redact
    format: '[CONFIDENTIAL {n}]'
- id: cookie_session_token
  display_name: Session Token / API Key / JWT
  description: Authentication tokens, session cookies, JWT tokens, API keys, access tokens, bearer tokens
  policy:
  - general
  enabled: true
  priority: 1
  gliner_label: session token or API key
  patterns:
  - (eyJ[A-Za-z0-9_\-]+(?:\.[A-Za-z0-9_\-]+){2})
  - (sk-[A-Za-z0-9_\-]{10,})
  - (?:API\s+Key|API\s+Token|Session\s+Token|Bearer\s+Token|Access\s+Token)\s*[:#]?\s*([A-Za-z0-9_\-\.]{10,})
  - (?:token|TOKEN)\s+([A-Za-z0-9_\-]{32,})\b
  - (?:JWT\s+Token|JWT\s+Key|Auth\s+Token)\s*[:#=]?\s*(JWT-[A-Za-z0-9_\-\.]{2,40})\b
  - \b(JWT-[A-Za-z0-9_\-]{2,20})\b
  - (?:Hospital\s+WiFi\s+Session\s+ID|Telemedicine\s+Session\s+ID)\s*[:#]?\s*([A-Za-z0-9\-]{4,20})
  - \b(eyJ[A-Za-z0-9_\-]{6,}\.[A-Za-z0-9_\-]{4,}(?:\.[A-Za-z0-9_\-]+)?)\b
  - ((?-i:PHPSESSID|JSESSIONID|connect\.sid|csrftoken|csrf_token|access_token|auth_token|refresh_token|session_id|sessionid|sess_id|_session|sid)\s*=\s*[^\s;,&]{4,256})
  - \b((?:sess|sid|tok|token|csrf|auth|sess_id|sessid)_[A-Za-z0-9]{6,})\b
  - \b((?:scid|usi|pst|api|est|cst|dat|sls|jwt|access|login|portal|sit)_[A-Za-z0-9]{6,})\b
  - (?<![A-Za-z0-9_\-])(eyJ[A-Za-z0-9_\-]{20,})(?![A-Za-z0-9_\-])
  - (remember[-_]me\s*=[^\s;,&]{4,256})
  - (?:LOGIN\s+SESSION#?|SESSION\s+(?:ID|TOKEN)#?|PORTAL\s+SESSION\s+ID)\s*[:#]?\s*([A-Za-z0-9_\-]{6,})\b
  masking:
    strategy: redact
    format: '[TOKEN {n}]'
- id: racial_ethnic_origin
  display_name: Racial or Ethnic Origin
  description: References to a person's racial or ethnic background
  policy:
  - general
  enabled: true
  priority: 3
  gliner_label: racial or ethnic background
  masking:
    strategy: redact
    format: '[RACE ETHNICITY {n}]'
- id: physical_characteristics
  display_name: Physical Characteristics / Description
  description: 'Descriptive physical characteristics of a person: height value (e.g. 5''10, 6ft), weight value (e.g. 180lbs), hair color (e.g. brown hair), eye color (e.g. blue eyes), skin tone, identifying
    marks (e.g. scar on left cheek, tattoo). Flag the descriptive value after ''Physical Characteristics'' keyword or standalone body descriptions.'
  policy:
  - general
  enabled: true
  priority: 3
  gliner_label: physical description height weight hair color eye color scar tattoo identifying marks
  patterns:
  - Physical\s+(?:Characteristics?|Description)\s+([^\.\n]{5,120})
  - (?:Height|Weight|Build|Complexion|Hair|Eyes?)\s*[:#]?\s*([^\.\,\n]{3,60})
  - \b((?:tattoo|birthmark|scar|mole)\s+(?:of\s+(?:a\s+)?|on\s+(?:the\s+)?)?[a-z][a-z\s]{2,50})\b
  - \b((?:hazel|blue|brown|green|gray|grey|amber|violet)\s+eyes)\b
  - \b((?:short|long|curly|straight|wavy|dark|light)\s+(?:black|brown|blonde|blond|red|gray|grey|auburn|white)\s+hair)\b
  - \b((?:short|long|curly|straight|wavy)\s+(?:black|brown|blonde|blond|red|gray|grey|auburn|white|dark|light)\s+hair)\b
  masking:
    strategy: redact
    format: '[PHYSICAL DESC {n}]'
- id: race
  display_name: Race
  description: Reference to a person's race
  policy:
  - general
  enabled: true
  priority: 3
  gliner_label: person's race
  masking:
    strategy: redact
    format: '[RACE {n}]'
- id: religion
  display_name: Religion
  description: Reference to a person's religious beliefs or affiliation
  policy:
  - general
  enabled: true
  priority: 3
  confidence_threshold: 0.95
  gliner_label: religious beliefs or affiliation
  masking:
    strategy: redact
    format: '[RELIGION {n}]'
- id: employment_history
  display_name: Employment History
  description: Past or current employer details, job titles, work history
  policy:
  - general
  enabled: true
  priority: 3
  gliner_label: employer name, job title, or work history
  patterns:
  - (?:worked|employed|hired|serving)\s+as\s+([A-Z][A-Za-z\s]{2,40}?)(?=\s+at\s|\s+in\s|\s+from\s|\s+since\s|[,\.])
  - (?:employment\s+history\s+is\s+worked\s+as\s+)([A-Z][A-Za-z\s]{2,40}?)(?=\s+at\s|\s+in\s|[,\.])
  - (?:job\s+title|position|role)\s*[:#=]?\s*([A-Z][A-Za-z\s]{2,40}?)(?=[,\.\n]|$)
  masking:
    strategy: redact
    format: '[EMPLOYMENT HISTORY {n}]'
- id: performance_evaluation
  display_name: Performance Evaluation
  description: Employee performance review data, ratings, or appraisal notes
  policy:
  - general
  enabled: true
  priority: 3
  gliner_label: performance review rating or appraisal
  patterns:
  - (?:rating|score|grade|performance|evaluation|appraisal|result)\s*[:#=]?\s*(\d{1,3}/\d{1,3})\b
  - (\d{1,3}\s+out\s+of\s+\d{1,3})(?:\s+stars?)?\b
  masking:
    strategy: redact
    format: '[PERFORMANCE EVAL {n}]'
- id: student_records_ferpa
  display_name: Student Records (FERPA)
  description: 'Educational records protected under FERPA: grades, transcripts, enrollment data'
  policy:
  - general
  enabled: true
  priority: 2
  gliner_label: student grades, transcript, or enrollment record
  patterns:
  - \bFER-\d{2,8}\b
  - (?:FERPA|Student\s+Record)\s*[:#]?\s*([A-Za-z0-9\-]{4,20})
  - \b(FERPA\s+FER-\d{2,8})\b
  - \b(STUDENT_RECORDS_FERPA-\d{4,10})\b
  masking:
    strategy: redact
    format: '[STUDENT RECORD {n}]'
- id: state_id_number
  display_name: State ID Number
  description: 'State-issued ID number. Detect based on keyword: State ID, State Identification Number'
  policy:
  - general
  enabled: true
  priority: 1
