  - id: case_number
    display_name: Case Number
    description: "Flag only the actual case ID value (e.g. CR-2024-00445, 2026-CR-001) near keywords: Case Number, Case #, Docket. NOT the label 'Case Number' itself."
    policy: [law_enforcement]
    enabled: true
    priority: 1
    gliner_label: "court case number criminal case docket number"
    patterns:
      - 'Case\s+(?:Number|No)\s*[:#]?\s*([A-Za-z0-9][\w\-]{3,20})'
      - 'Docket\s+(?:Number|No)\s*[:#]?\s*([A-Za-z0-9\-]{4,20})'
      # "Case Number 2026-CR-001" — year-prefix format
      - 'Case\s+(?:Number|No)\s+(\d{4}-[A-Z]{1,4}-\d{1,6})\b'
      # "CASE-398..." direct prefix format
      - '\b(CASE-[A-Za-z0-9\-]{3,20})\b'
      # "2024-CR-00445" year prefix
      - '\b(\d{4}-(?:CR|CV|CF|MC|DR|JV|CJ|PC|SC|CC|DC|FC|GC|HC|IC|KC|LC|NC|OC|RC|TC|WC)-\d{1,6})\b'
      # "Board Resolution 2025-001", "Reference No. 2024-123", "Doc No 2025-0042"
      - '(?:Board\s+Resolution|Resolution|Reference\s+(?:No\.?|Number)|Doc(?:ument)?\s+(?:No\.?|Number|#)|Ref\s+No\.?)\s*[:#]?\s*(\d{4}-\d{3,8})\b'
      - '\b((?:CID|CFN|CTN|CRD|LFN|CRG|CIN|CFI|LPN|CEN|JTN|CEV|CLI|LCN|CCN|INCN|JCN|OCN|IRN)-\d{4,})\b'
      - '\b((?-i:[A-Z]{2,6})-\d{3,}(?:-\d{1,6})*)\b'
    masking:
      strategy: redact
      format: "[CASE NUMBER {n}]"

