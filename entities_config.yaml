# =============================================================================
# PII Entity Configuration
# =============================================================================
# Single source of truth for all entity behaviour.
# No entity name, label, or masking format is written in Python.
#
# Policy values used on entities:
#   hipaa          — HIPAA Safe Harbor 18 PHI identifiers (45 CFR §164.514)
#   pci_dss        — PCI-DSS v4.0 cardholder & sensitive authentication data
#   general        — General PII (passwords, credentials, sensitive attributes)
#   law_enforcement— Criminal justice & CJIS records
#   transportation — Vehicle, driver, and transit-specific identifiers
#
# Masking format:
#   {n} = sequential counter per entity TYPE within one document.
#   Same original value → same label+number within a document.
#
# Fields:
#   id                   Unique snake_case identifier
#   display_name         Human-readable label
#   description          Detection hint for the LLM
#   policy               List of applicable regulatory standards
#   enabled              true = active | false = disabled
#   priority             1 (highest) to 10 — resolves overlapping spans
#   confidence_threshold Override global threshold (optional)
#   presidio_type        Maps to Presidio built-in recognizer (optional)
#   patterns             List of regex patterns (capturing group = the value)
#   masking.strategy     redact | substitute | hash | partial_redact | encrypt
#   masking.format       Template — {n} auto-counter, plus {hash8} {last4} etc.
# =============================================================================

global:
  default_confidence_threshold: 0.85
  default_masking_strategy: redact
  language: auto

  # ── Policy gates ────────────────────────────────────────────────────────────
  # List only the policies you want active. Leave empty ([]) to enable ALL.
  # Example (HIPAA + PCI only): enabled_policies: [hipaa, pci_dss]
  enabled_policies: []

  # ── Label-word filter ────────────────────────────────────────────────────────
  # LLM validation handles label vs value disambiguation in context.
  # Add entries here only for edge cases the LLM consistently misses.
  label_blocklist: []

  # ── No-multiline entity IDs ──────────────────────────────────────────────────
  # If a detected span for these entity types contains a newline, it is trimmed
  # to the text before the first newline (never discarded entirely).
  no_multiline_entity_ids:
    - person_name
    - email_address
    - phone_number
    - fax_number
    - ssn
    - credit_card_number
    - ip_address
    - medical_record_number
    - date_of_birth
    - bank_account_number
    - bank_routing_number
    - iban
    - card_expiration_date
    - card_service_code
    - npi_number
    - dea_number
    - swift_bic_code


entities:

# ══════════════════════════════════════════════════════════════════════════════
# HIPAA SAFE HARBOR — 18 PHI Identifiers  (45 CFR §164.514(b)(2))
# ══════════════════════════════════════════════════════════════════════════════

# ── #1  Names ─────────────────────────────────────────────────────────────────

  - id: person_name
    display_name: Person / Full Name / Alias
    description: "Human personal names only: first name, last name, full name, nickname, or alias of a real person. Do NOT flag dates, section headers, department names, medical terms, organization names, city names, or state names."
    policy: [hipaa]
    enabled: true
    priority: 2
    presidio_type: PERSON
    patterns:
      - '(?:Dr\.|Prof\.|Mr\.|Mrs\.|Ms\.|Mx\.|Attorney|Atty\.)\s+[A-Z][a-z]+(?:\s+[A-Z][a-z]+)+'
    masking:
      strategy: redact
      format: "[PERSON {n}]"

# ── #2  Geographic data smaller than state ────────────────────────────────────

  - id: street_address
    display_name: Street Address Line / House Number and Street
    description: "Street address line only: house/building number + street name. Do NOT include city, state, or zip — those are separate entities. Example: '742 Evergreen Terrace', '85 River Road', '1600 Pennsylvania Ave NW Apt 3B'."
    policy: [hipaa]
    enabled: true
    priority: 2
    patterns:
      - '(\d{1,6}[ \t]+[A-Za-z0-9 \t]+[ \t]+(?:Avenue|Ave|Street|St|Boulevard|Blvd|Road|Rd|Lane|Ln|Drive|Dr|Court|Ct|Way|Place|Pl|Circle|Cir|Terrace|Terr?|Highway|Hwy|Parkway|Pkwy)\.?(?:[ \t]+(?:Apt\.?|Apartment|Suite|Ste|Unit|#)[ \t]*[\w\-]+)?)'
    masking:
      strategy: redact
      format: "[ADDRESS {n}]"

  - id: city_name
    display_name: City Name / Town / Municipality
    description: "Name of a city, town, or municipality when it is part of a personal address or location disclosure. Example: 'Chicago', 'San Francisco', 'Newark'. Do NOT flag city names mentioned as generic geographic context."
    policy: [hipaa]
    enabled: true
    priority: 3
    gliner_label: "city or town in a personal address"
    masking:
      strategy: redact
      format: "[LOCATION {n}]"

  - id: us_state
    display_name: US State or Territory Abbreviation
    description: "Two-letter US state or territory abbreviation when part of a personal address. Example: 'IL', 'CA', 'TX', 'NY'. Only flag when adjacent to a street address or zip code."
    policy: [hipaa]
    enabled: true
    priority: 3
    patterns:
      - '(?:,\s*)(AL|AK|AZ|AR|CA|CO|CT|DE|FL|GA|HI|ID|IL|IN|IA|KS|KY|LA|ME|MD|MA|MI|MN|MS|MO|MT|NE|NV|NH|NJ|NM|NY|NC|ND|OH|OK|OR|PA|RI|SC|SD|TN|TX|UT|VT|VA|WA|WV|WI|WY|DC)(?=\s+\d{5})'
    masking:
      strategy: redact
      format: "[STATE {n}]"

  - id: zipcode
    display_name: ZIP Code / Postal Code
    description: "US ZIP code or postal code when part of a personal address. Example: '60614', '94303', '07102-1234'."
    policy: [hipaa]
    enabled: true
    priority: 3
    patterns:
      - '(?:,?\s*[A-Z]{2}\s+)(\d{5}(?:-\d{4})?)\b'
      - '(?:zip|postal)\s+(?:code|#)?\s*:?\s*(\d{5}(?:-\d{4})?)'
    masking:
      strategy: redact
      format: "[ZIPCODE {n}]"

  - id: precise_geolocation
    display_name: Precise Geolocation
    description: "GPS coordinates or precise physical location data. Example: 37.7749, -122.4194"
    policy: [hipaa]
    enabled: true
    priority: 2
    gliner_label: "GPS coordinates or precise geolocation"
    patterns:
      - '((?:-?\d{1,3}\.\d{4,8})\s*,\s*(?:-?\d{1,3}\.\d{4,8}))'
      - '(?:lat(?:itude)?|lon(?:g(?:itude)?)?)\s*[:#=]?\s*(-?\d{1,3}\.\d{4,8})'
    masking:
      strategy: redact
      format: "[GPS {n}]"

# ── #3  Dates (except year) tied to individual ────────────────────────────────

  - id: date_of_birth
    display_name: Date of Birth
    description: "Flag only the actual date value (e.g. 07/15/2005, 15/07/2005, 2005-07-15, March 14 1988) when near keywords DOB, Date of Birth, born on. NOT the label word 'DOB' itself. NOT visit dates or report dates."
    policy: [hipaa]
    enabled: true
    priority: 2
    patterns:
      - '(?:DOB|Date\s+of\s+Birth)\s*[:#]?\s*(\d{1,2}[/.\-]\d{1,2}[/.\-]\d{2,4})'
      - '(?:DOB|Date\s+of\s+Birth)\s*[:#]?\s*(\d{4}-\d{2}-\d{2})'
      - 'born\s+on\s+(\d{1,2}[/.\-]\d{1,2}[/.\-]\d{2,4})'
      - 'born\s+on\s+(\d{4}-\d{2}-\d{2})'
      - '(?:born|dob|date\s+of\s+birth)\s*[:#]?\s*([A-Za-z]+\s+\d{1,2},?\s+\d{4})'
    masking:
      strategy: redact
      format: "[DOB {n}]"

  - id: clinical_date
    display_name: Clinical / Procedure / Event Date
    description: "Any significant event date tied to a person: clinical visit, procedure, admission, discharge, transaction, submission, enrollment, employment start, filing, booking. Flag the date VALUE only, NOT keyword labels."
    policy: [hipaa]
    enabled: true
    priority: 2
    patterns:
      - '(?:PROCEDURE|RECEIVED|REPORT|ADMISSION|DISCHARGE|SERVICE|VISIT|RECORD(?:ED)?|SUBMITTED?|CREATED?|OPENED?|LOSS|INCIDENT|TRANSACTION|ENROLLMENT|TERMINATION|EFFECTIVE|EXPIRY|EXPIRATION|FILING|HEARING|ARREST|CONVICTION|BOOKING)\s+DATE\s*[:#]?\s*(\d{1,2}[/.\-]\d{1,2}[/.\-]\d{2,4})'
      - 'DATE\s+OF\s+(?:LOSS|INCIDENT|SERVICE|ADMISSION|DISCHARGE|BIRTH|DEATH|INJURY|ACCIDENT|FILING|ARREST)\s*[:#]?\s*(\d{1,2}[/.\-]\d{1,2}[/.\-]\d{2,4})'
      - '^(\d{1,2}[/.\-]\d{1,2}[/.\-]\d{4})\s+[A-Za-z]'
      - '(?:Done|Pending|Completed|Ordered|Processed|Submitted|Filed|Booked|Enrolled|Joined|Registered|Reported|Opened|Arrested|Convicted|Sentenced|Created|Issued|Activated|Closed|Resolved|Reviewed|Approved|Denied|Referred)\s*[:\s]+(?:on\s+)?(\d{1,2}[/.\-]\d{1,2}[/.\-]\d{2,4})'
      - '[—–]\s*(\d{1,2}[/.\-]\d{1,2}[/.\-]\d{4})\b'
      - '(?:on\s+)(\d{1,2}[/.\-]\d{1,2}[/.\-]\d{4})'
    masking:
      strategy: redact
      format: "[DATE {n}]"

# ── #4  Phone numbers ─────────────────────────────────────────────────────────

  - id: phone_number
    display_name: Phone Number
    description: "Flag only the actual digit sequence of a phone number (e.g. +1-415-555-0192, (419) 555-8923). NOT the label word 'Phone' or 'Tel' itself."
    policy: [hipaa]
    enabled: true
    priority: 1
    presidio_type: PHONE_NUMBER
    patterns:
      - '(\(\d{3}\)\s*\d{3}[-.\s]\d{4})'
      - '(\+\d[\d\s\-\(\)]{9,15})'
    masking:
      strategy: redact
      format: "[PHONE NUMBER {n}]"

# ── #5  Fax numbers ───────────────────────────────────────────────────────────

  - id: fax_number
    display_name: Fax Number
    description: "Fax number digit sequence near keyword: Fax, FAX, Fax Number. NOT the label 'Fax' itself."
    policy: [hipaa]
    enabled: true
    priority: 1
    patterns:
      - '(?:FAX|Fax)\s*(?:Number|No|#)?\s*[:#]?\s*(\+?[\d\s\-\(\)\.]{9,18})'
      - '(?:FAX|Fax)\s*[:#]\s*(\+?[\d\s\-\(\)\.]{9,18})'
    masking:
      strategy: redact
      format: "[FAX NUMBER {n}]"

# ── #6  Email addresses ───────────────────────────────────────────────────────

  - id: email_address
    display_name: Email Address
    policy: [hipaa]
    enabled: true
    priority: 1
    presidio_type: EMAIL_ADDRESS
    masking:
      strategy: redact
      format: "[EMAIL {n}]"

# ── #7  Social Security Numbers ───────────────────────────────────────────────

  - id: ssn
    display_name: Social Security Number
    description: "Flag only the numeric value in format NNN-NN-NNNN or 9 digits (e.g. 078-05-1120). NOT the label word 'SSN' itself."
    policy: [hipaa]
    enabled: true
    priority: 1
    presidio_type: US_SSN
    patterns:
      - '(\d{3}-\d{2}-\d{4})'
    masking:
      strategy: redact
      format: "[SSN {n}]"

# ── #8  Medical record numbers ────────────────────────────────────────────────

  - id: medical_record_number
    display_name: Medical Record Number (MRN)
    description: "Flag only the numeric or alphanumeric VALUE that follows keywords: MRN, Medical Record Number, Patient ID. Example: in 'MRN:4829746' flag '4829746', NOT the word 'MRN' itself."
    policy: [hipaa]
    enabled: true
    priority: 1
    patterns:
      - '(?:MRN|Medical\s+Record\s+(?:Number|No))\s*[:#]?\s*([A-Za-z0-9\-]{4,15})'
      - 'Patient\s+ID\s*[:#]?\s*([A-Za-z0-9\-]{4,15})'
    masking:
      strategy: redact
      format: "[MRN {n}]"

# ── #9  Health plan beneficiary numbers ───────────────────────────────────────

  - id: health_plan_beneficiary_number
    display_name: Health Plan Beneficiary / Member Number
    description: "Health plan beneficiary number, member ID, or group number. Detect near keywords: Beneficiary Number, Member ID, Member Number, Group Number, Subscriber ID."
    policy: [hipaa]
    enabled: true
    priority: 1
    patterns:
      # Insurer-prefixed IDs — most reliable, no keyword required
      - '(?:HPN|UHC|HP|BCBS|CIGNA|AETNA|HUMANA|ANTHEM|KAISER|UNITED|MOLINA|CVS|OPTUM)-[A-Za-z0-9\-]{4,20}'
      # Keyword-preceded values — allow "is", ":", "#" as separators
      - '(?:Health\s+Plan\s+)?Beneficiary\s+(?:Number|No|ID)\s*[:#=]?\s*(?:is\s+)?([A-Za-z0-9\-]{4,20})'
      - 'Member\s+(?:ID|Number|No)\s*[:#=]?\s*(?:is\s+)?([A-Za-z0-9\-]{4,20})'
      - 'Group\s+(?:Number|No|ID)\s*[:#=]?\s*(?:is\s+)?([A-Za-z0-9\-]{4,20})'
      - 'Subscriber\s+(?:ID|Number|No)\s*[:#=]?\s*(?:is\s+)?([A-Za-z0-9\-]{4,20})'
    masking:
      strategy: redact
      format: "[INSURANCE ID {n}]"

# ── #10  Account numbers ──────────────────────────────────────────────────────

  - id: insurance_policy_number
    display_name: Insurance Policy Number
    description: "Insurance policy number. Detect based on keyword: Policy Number, Insurance Policy, Policy #. POL- prefix always indicates an insurance policy number."
    policy: [hipaa]
    enabled: true
    priority: 2
    patterns:
      - '(?:Policy\s+(?:Number|No|#)\s*[:#]?\s*)([A-Za-z0-9\-]{4,20})'
      - '\bPOL-[A-Za-z0-9\-]{4,20}\b'
    masking:
      strategy: redact
      format: "[INSURANCE POLICY {n}]"

  - id: billing_number
    display_name: Billing Number
    description: "Patient or account billing number. Flag the numeric VALUE that follows keywords: Billing Number, Billing No, Bill No, BILLING NO. Example: in 'BILLING NO:8646139' flag '8646139'."
    policy: [hipaa]
    enabled: true
    priority: 1
    patterns:
      - 'BILLING\s*NO\.?\s*[:#]?\s*(\d{4,12})'
      - 'Billing\s+(?:Number|No)\s*[:#]?\s*(\d{4,12})'
      - 'Bill\s+No\s*[:#]?\s*(\d{4,12})'
    masking:
      strategy: redact
      format: "[BILLING NO {n}]"

# ── #11  Certificate / license numbers ───────────────────────────────────────

  - id: medical_license_number
    display_name: Medical License / Certificate Number
    description: "State medical license number or professional certificate number for healthcare providers. HIPAA Safe Harbor #11. Detect near keywords: Medical License, License No, State License, Certificate Number."
    policy: [hipaa]
    enabled: true
    priority: 1
    patterns:
      - '(?:Medical|Clinical|State|Professional)\s+License\s*(?:Number|No|#)?\s*[:#]?\s*([A-Za-z0-9\-]{4,15})'
      - 'License\s+(?:Number|No)\s*[:#]?\s*([A-Za-z0-9\-]{4,15})'
      - 'Certificate\s+(?:Number|No)\s*[:#]?\s*([A-Za-z0-9\-]{4,15})'
    masking:
      strategy: redact
      format: "[MED LICENSE {n}]"

  - id: dea_number
    display_name: DEA Registration Number
    description: "DEA controlled substance registration number. Format: 2 letters + 7 digits. Flag the VALUE, NOT the label 'DEA'."
    policy: [hipaa]
    enabled: true
    priority: 1
    patterns:
      - '\bDEA\s*(?:Number|No|#|Registration)?\s*[:#]?\s*([A-Za-z]{2}\d{7})\b'
    masking:
      strategy: redact
      format: "[DEA NUMBER {n}]"

  - id: npi_number
    display_name: National Provider Identifier (NPI)
    description: "Healthcare provider NPI — exactly 10 digits following keyword NPI. HIPAA-covered provider identifier. Flag the 10-digit VALUE, NOT the label 'NPI' itself."
    policy: [hipaa]
    enabled: true
    priority: 1
    patterns:
      - '\bNPI\s*[:#]?\s*(\d{10})\b'
      - 'National\s+Provider\s+Identifier\s*[:#]?\s*(\d{10})'
    masking:
      strategy: redact
      format: "[NPI {n}]"

  - id: passport_number
    display_name: Passport Number
    description: "Passport or travel document number. Example: X1234567 (letter + 7 digits)"
    policy: [hipaa]
    enabled: true
    priority: 1
    presidio_type: US_PASSPORT
    patterns:
      - 'Passport\s+(?:Number|No|#)\s*[:#]?\s*([A-Za-z][A-Za-z0-9]{5,10})'
      - 'Passport\s+(?:Number|No|#)\s*[:#]?\s*(\d{9})'
    masking:
      strategy: redact
      format: "[PASSPORT {n}]"

  - id: drivers_license
    display_name: Driver''s License Number
    description: "Driver license number. Format varies by state. Example: D123-456-7890"
    policy: [hipaa]
    enabled: true
    priority: 1
    presidio_type: US_DRIVER_LICENSE
    patterns:
      - 'Driver''s?\s+License\s*[:#]?\s*([A-Za-z0-9\-]{6,18})'
      - '\bDL\s*[:#]?\s*([A-Za-z0-9\-]{6,18})'
    masking:
      strategy: redact
      format: "[DRIVERS LICENSE {n}]"

# ── #12  Vehicle identifiers ──────────────────────────────────────────────────

  - id: vehicle_vin
    display_name: Vehicle Identification Number (VIN)
    description: "17-character vehicle identification number. Example: 1HGCM82633A004352"
    policy: [hipaa, transportation]
    enabled: true
    priority: 2
    gliner_label: "vehicle identification number VIN"
    patterns:
      - '(?:VIN|Vehicle\s+Identification\s+Number)\s*[:#]?\s*([A-HJ-NPR-Z0-9]{17})\b'
      - '\b([A-HJ-NPR-Z0-9]{17})\b'
    masking:
      strategy: redact
      format: "[VIN {n}]"

  - id: license_plate
    display_name: License Plate Number
    description: "Vehicle license plate number. Detect based on keyword: license plate, plate number, vehicle plate, tag number. Example: ABC-1234"
    policy: [hipaa, transportation]
    enabled: true
    priority: 2
    gliner_label: "vehicle license plate number"
    patterns:
      - '(?:license\s+plate|plate\s+(?:number|no\.?|#)|vehicle\s+plate|tag\s+number)\s*[:#]?\s*([A-Z0-9]{1,3}[\s\-]?[A-Z0-9]{1,4}[\s\-]?[A-Z0-9]{0,4})'
    masking:
      strategy: redact
      format: "[LICENSE PLATE {n}]"

# ── #13  Device identifiers ───────────────────────────────────────────────────

  - id: device_identifier
    display_name: Device Identifier / MAC Address / IMEI
    description: "Hardware device identifiers: MAC address (AA:BB:CC:DD:EE:FF), IMEI number (15 digits, e.g. 490154203237518), device serial number"
    policy: [hipaa]
    enabled: true
    priority: 2
    patterns:
      - '([0-9A-Fa-f]{2}(?:[:\-][0-9A-Fa-f]{2}){5})'
      - '\bIMEI\s*[:#]?\s*(\d{15})\b'
    masking:
      strategy: redact
      format: "[DEVICE ID {n}]"

# ── #14  Web URLs ─────────────────────────────────────────────────────────────

  - id: url_with_pii
    display_name: URL with PII
    description: "Flag only actual URL values (starting with http/https) from sensitive or internal domains. NOT the label word 'URL' itself. Do not flag generic public URLs."
    policy: [hipaa]
    enabled: true
    priority: 3
    confidence_threshold: 0.80
    patterns:
      - '(https?://\S+)'
    masking:
      strategy: redact
      format: "[URL {n}]"

# ── #15  IP addresses ─────────────────────────────────────────────────────────

  - id: ip_address
    display_name: IP Address
    description: "Flag only the actual IP value in format NNN.NNN.NNN.NNN or IPv6 (e.g. 192.168.1.105). NOT the label word 'IP' or 'IP Address' itself."
    policy: [hipaa]
    enabled: true
    priority: 1
    presidio_type: IP_ADDRESS
    masking:
      strategy: redact
      format: "[IP ADDRESS {n}]"

# ── #16 & #17  Biometric identifiers / full-face photographs ─────────────────

  - id: biometric_facial_recognition
    display_name: Biometric — Facial Recognition / Photograph
    description: "Facial recognition data, face scan, facial feature descriptors, or full-face patient photographs"
    policy: [hipaa]
    enabled: true
    priority: 1
    gliner_label: "facial recognition or face scan data"
    masking:
      strategy: redact
      format: "[BIOMETRIC FACE {n}]"

  - id: biometric_voiceprint
    display_name: Biometric — Voiceprint
    description: "Voice recognition data or voiceprint identifiers"
    policy: [hipaa]
    enabled: true
    priority: 1
    gliner_label: "voiceprint or voice recognition data"
    masking:
      strategy: redact
      format: "[BIOMETRIC VOICE {n}]"

  - id: biometric_iris_scan
    display_name: Biometric — Iris Scan
    description: "Iris scan or retina scan data"
    policy: [hipaa]
    enabled: true
    priority: 1
    gliner_label: "iris scan or retina scan"
    masking:
      strategy: redact
      format: "[BIOMETRIC IRIS {n}]"

  - id: biometric_dna
    display_name: Biometric — DNA Information
    description: "DNA profile, genetic data, or genomic information"
    policy: [hipaa]
    enabled: true
    priority: 1
    gliner_label: "DNA profile or genetic information"
    masking:
      strategy: redact
      format: "[BIOMETRIC DNA {n}]"

  - id: fingerprint
    display_name: Fingerprint Data
    description: "Fingerprint or palm print biometric data"
    policy: [hipaa]
    enabled: true
    priority: 1
    gliner_label: "fingerprint or palm print data"
    masking:
      strategy: redact
      format: "[FINGERPRINT {n}]"

# ── #18  Any other unique identifying number ──────────────────────────────────

  - id: organization_name
    display_name: Company / Organization Name
    description: "Company, business, or organization name only. Do NOT flag city names, state names, country names, or geographic locations."
    policy: [hipaa]
    enabled: true
    priority: 4
    confidence_threshold: 0.90
    presidio_type: ORG
    patterns:
      - '^([A-Z][A-Z ,&.]{5,},?\s*INC\.?)$'
      - '^([A-Z][A-Z ,&.]{5,}\s+LLC\.?)$'
      - '^([A-Z][A-Z ,&.]{5,}\s+(?:CORP(?:ORATION)?|LTD)\.?)$'
      - '^([A-Z][A-Z &.]{5,}\s+(?:CITY\s+)?(?:GENERAL\s+)?(?:MEMORIAL\s+)?HOSPITAL)$'
      - '^([A-Z][A-Z &.]{5,}\s+HEALTH\s+SYSTEM)$'
      - '^([A-Z][A-Z &.]{5,}\s+MEDICAL\s+CENTER)$'
      - '^([A-Z][A-Z &.]{5,}\s+(?:PATHOLOGY|DIAGNOSTIC|RADIOLOGY)\s+(?:ASSOCIATES|CLINIC|CENTER))$'
      - '\b((?:(?-i:[A-Z])[A-Za-z]+[ \t]+){1,4}(?:Memorial(?:[ \t]+Hospital)?|Medical[ \t]+Center|General[ \t]+Hospital|Health[ \t]+System|University[ \t]+Hospital))\b'
    masking:
      strategy: redact
      format: "[COMPANY {n}]"

  - id: signature
    display_name: Signature
    description: "Electronic or physical signature reference"
    policy: [hipaa]
    enabled: true
    priority: 2
    gliner_label: "electronic or physical signature"
    masking:
      strategy: redact
      format: "[SIGNATURE {n}]"


# ══════════════════════════════════════════════════════════════════════════════
# PCI-DSS v4.0 — Cardholder Data & Sensitive Authentication Data
# ══════════════════════════════════════════════════════════════════════════════

# ── Cardholder Data ───────────────────────────────────────────────────────────

  - id: credit_card_number
    display_name: Credit / Debit Card Number (PAN)
    description: "Primary Account Number (PAN). Example: 4111 1111 1111 1111"
    policy: [pci_dss]
    enabled: true
    priority: 1
    presidio_type: CREDIT_CARD
    patterns:
      - '\b(\d{4}[-\s]\d{4}[-\s]\d{4}[-\s]\d{4})\b'
    masking:
      strategy: redact
      format: "[CARD NUMBER {n}]"

  - id: card_holder_name
    display_name: Card Holder Name
    description: "Name physically printed on a credit or debit card. Only flag when immediately adjacent to a card number or CVV. Do NOT flag physicians, patients, employees, or any other person names."
    policy: [pci_dss]
    enabled: false
    priority: 2
    masking:
      strategy: redact
      format: "[PERSON {n}]"

  - id: card_expiration_date
    display_name: Card Expiry MM/YY (two-digit year, no day)
    description: "Credit/debit card expiry date in MM/YY format ONLY — exactly 2 digits slash 2 digits (e.g. '09/27', '03/26'). Never flag 3-part dates with a day and 4-digit year like '03/14/2025' — those are clinical dates."
    policy: [pci_dss]
    enabled: true
    priority: 1
    patterns:
      - '(?:Expiry|Exp(?:iration)?)\s*(?:Date\s*)?[:#]?\s*(\d{2}/\d{2})\b'
    masking:
      strategy: redact
      format: "[CARD EXP {n}]"

  - id: card_service_code
    display_name: Card Service Code / CVV / CVC
    description: "Card verification value (CVV, CVC, CVV2, CAV2, CID) or 3-digit magnetic stripe service code"
    policy: [pci_dss]
    enabled: true
    priority: 1
    confidence_threshold: 0.70
    patterns:
      - 'CVV2?\s*[:#]?\s*(\d{3,4})'
      - 'CVC\s*[:#]?\s*(\d{3,4})'
      - 'CAV2?\s*[:#]?\s*(\d{3,4})'
      - 'CID\s*[:#]?\s*(\d{3,4})'
      - 'Security\s+Code\s*[:#]?\s*(\d{3,4})'
    masking:
      strategy: redact
      format: "[CVV {n}]"

# ── Sensitive Authentication Data ─────────────────────────────────────────────

  - id: card_track_data
    display_name: Card Track Data (Magnetic Stripe)
    description: "Full magnetic stripe track data. Track 1 starts with %B followed by PAN and cardholder name. Track 2 starts with semicolon followed by PAN. PCI-DSS SAD."
    policy: [pci_dss]
    enabled: true
    priority: 1
    patterns:
      - '(%B\d{13,19}\^[^\^]{1,26}\^\d{4}[^\?]*\?)'
      - '(;\d{13,19}=\d{4}[^?]*\?)'
    masking:
      strategy: redact
      format: "[CARD TRACK {n}]"

  - id: card_pin
    display_name: Card PIN / PIN Block
    description: "Payment card PIN or encrypted PIN block. Flag the value near keyword: PIN, PIN Block. PCI-DSS SAD."
    policy: [pci_dss]
    enabled: true
    priority: 1
    confidence_threshold: 0.70
    patterns:
      - '\bPIN\s+Block\s*[:#]?\s*([A-Fa-f0-9]{16,})\b'
      - '\bPIN\s*[:#]\s*(\d{4,6})\b'
    masking:
      strategy: redact
      format: "[CARD PIN {n}]"

  - id: card_cryptogram
    display_name: Card Cryptogram / Dynamic Auth Value
    description: "EMV chip cryptogram or dynamic authentication value generated per-transaction. Detect near keywords: Cryptogram, ARQC, TC, AAC, Dynamic Auth."
    policy: [pci_dss]
    enabled: true
    priority: 1
    patterns:
      - '(?:ARQC|TC\b|AAC|Cryptogram|Dynamic\s+Auth(?:entication)?(?:\s+Value)?)\s*[:#]?\s*([A-Fa-f0-9]{8,16})\b'
    masking:
      strategy: redact
      format: "[CRYPTOGRAM {n}]"

  - id: card_iin_bin
    display_name: Card IIN / BIN (Issuer Identification Number)
    description: "Issuer Identification Number — first 6-8 digits of a PAN. PCI-DSS protected when stored separately. Detect near keywords: IIN, BIN, Issuer Number."
    policy: [pci_dss]
    enabled: true
    priority: 2
    patterns:
      - '(?:IIN|BIN|Issuer\s+(?:Identification\s+)?Number)\s*[:#]?\s*(\d{6,8})\b'
    masking:
      strategy: redact
      format: "[IIN {n}]"

# ── Financial Account Identifiers (PCI-DSS + HIPAA #10) ──────────────────────

  - id: bank_account_number
    display_name: Bank Account Number
    description: "Detect based on keyword: Bank Account Number, Account Number, Checking Account, Savings Account"
    policy: [pci_dss, hipaa]
    enabled: true
    priority: 1
    presidio_type: US_BANK_NUMBER
    masking:
      strategy: redact
      format: "[BANK ACCOUNT {n}]"

  - id: bank_routing_number
    display_name: Bank Routing Number
    description: "Flag only the 9-digit numeric value (e.g. 021000021) near keywords: Routing Number, ABA Number. NOT the label 'Routing Number' itself."
    policy: [pci_dss, hipaa]
    enabled: true
    priority: 1
    patterns:
      - 'Routing\s+(?:Number|No)\s*[:#]?\s*(\d{9})'
      - 'ABA\s+(?:Number|No)\s*[:#]?\s*(\d{9})'
    masking:
      strategy: redact
      format: "[ROUTING NUMBER {n}]"

  - id: iban
    display_name: IBAN
    description: "Flag only the actual IBAN value starting with 2-letter country code + digits (e.g. GB29NWBK60161331926819). NOT the label word 'IBAN' itself."
    policy: [pci_dss, hipaa]
    enabled: true
    priority: 1
    presidio_type: IBAN_CODE
    masking:
      strategy: redact
      format: "[IBAN {n}]"

  - id: swift_bic_code
    display_name: SWIFT / BIC Code
    description: "SWIFT Bank Identifier Code (8 or 11 chars: 4 bank code + 2 country + 2 location + optional 3 branch). Example: CHASUS33, BNPAFRPPPAR. Detect near keywords: SWIFT, BIC, SWIFT Code, BIC Code."
    policy: [pci_dss]
    enabled: true
    priority: 1
    patterns:
      - '\b(?:SWIFT|BIC)\b\s*(?:Code)?\s*[:#]?\s*([A-Z]{4}[A-Z]{2}[A-Z0-9]{2}(?:[A-Z0-9]{3})?)\b'
    masking:
      strategy: redact
      format: "[SWIFT {n}]"

# ── Transaction / Merchant Identifiers ────────────────────────────────────────

  - id: merchant_id
    display_name: Merchant ID (MID)
    description: "Merchant identifier assigned by the payment processor. Detect near keyword: Merchant ID, MID. Example: MID-88234001"
    policy: [pci_dss]
    enabled: true
    priority: 2
    patterns:
      - '(?:Merchant\s+ID|MID)\s*[:#]?\s*([A-Za-z0-9\-]{4,20})\b'
    masking:
      strategy: redact
      format: "[MERCHANT ID {n}]"

  - id: terminal_id
    display_name: Terminal ID (TID)
    description: "POS terminal identifier assigned by the acquirer. Detect near keyword: Terminal ID, TID. Example: TID-44120099"
    policy: [pci_dss]
    enabled: true
    priority: 2
    patterns:
      - '(?:Terminal\s+ID|TID)\s*[:#]?\s*([A-Za-z0-9\-]{4,20})\b'
    masking:
      strategy: redact
      format: "[TERMINAL ID {n}]"

  - id: transaction_id
    display_name: Transaction ID
    description: "Payment transaction identifier. Detect near keyword: Transaction ID, TXN, Transaction No. Example: TXN-20240508-00123"
    policy: [pci_dss]
    enabled: true
    priority: 2
    patterns:
      - '(?:Transaction\s+(?:ID|No)|TXN)\s*[:#]?\s*([A-Za-z0-9\-]{4,30})\b'
    masking:
      strategy: redact
      format: "[TRANSACTION ID {n}]"


