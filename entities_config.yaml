  - (?:DNA\s+Sequence|DNA\s+Sample\s+ID|Genetic\s+Marker|Genome\s+Sequence|DNA\s+Identifier|DNA\s+Record|DNA\s+Code|Genetic\s+Sequence|DNA\s+Data|DNA\s+Reference|DNA\s+Pattern|Human\s+DNA|Biometric\s+Genetic\s+ID|DNA\s+Hash|Genetic\s+Signature|Forensic\s+DNA\s+ID|DNA\s+Registration\s+Number)\s*[:#]?\s*([A-Za-z0-9\-]{4,30})
