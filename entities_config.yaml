    policy: [general]
    enabled: true
    priority: 3
    patterns:
      - '\b((?:(?-i:[A-Z])[A-Za-z]+[ \t]+){1,4}(?:Insurance|Ins\.|Assurance|Mutual|Underwriters?))\b'
      - '\b(Aetna|UnitedHealth(?:care)?|Cigna|Humana|Anthem|Blue\s+Cross|Blue\s+Shield|Kaiser|Molina|Centene|MetLife|Prudential|Allstate|State\s+Farm|GEICO|Progressive|Travelers)\b'
    masking:
      strategy: redact
