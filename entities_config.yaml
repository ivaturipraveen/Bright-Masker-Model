  - \b(0\d{2,4}[-\s]\d{3,4}[-\s]\d{4})\b
  - \b(0\d{2,4}[-\s]\d{6,8})\b
  - \b([6-9]\d{4}\s\d{5})\b
  - (\+\d{1,3}[-\s]\d{1,4}[-\s]\d{3,4}[-\s]\d{3,4}(?:\s*(?:ext|x)\s*\d{1,6})?)
  - (?:Customer\s+Support|Service\s+Helpline|Toll[\s-]?Free|Helpline)\s+(?:Number|No)?\s*[:#]?\s*(\+?[\d][\d\s\-\(\)\.]{8,20})
