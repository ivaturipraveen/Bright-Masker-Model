# ══════════════════════════════════════════════════════════════════════════════
# TRANSPORTATION — Vehicle, Driver, and Transit-Specific Identifiers
# ══════════════════════════════════════════════════════════════════════════════

  - id: driver_history
    display_name: Driver History Record
    description: "Driver history, driving record, or DMV record. Detect based on keyword: driving record, driver history, DMV record"
    policy: [transportation]
    enabled: true
    priority: 2
    gliner_label: "driving record or DMV record"
    patterns:
      - '(?:driving\s+record|driver\s+history|DMV\s+record)\s*(?:#|number|no\.?)?\s*[:#]?\s*([A-Z0-9\-]{4,20})'
    masking:
      strategy: redact
      format: "[DRIVER HISTORY {n}]"

  - id: bart_employee_id
    display_name: BART Employee ID
    description: "BART employee identification number — 5 or 6 digit number. Detect based on keyword: Employee ID, BART Employee ID, Emp ID"
    policy: [transportation]
    enabled: true
    priority: 1
    gliner_label: "BART transit employee ID"
    patterns:
      - '(?:BART\s+)?Employee\s+ID\s*[:#]?\s*(\d{4,8})'
      - 'Emp(?:loyee)?\s*(?:ID|No)\s*[:#]?\s*(\d{4,8})'
    masking:
      strategy: redact
      format: "[BART EMP ID {n}]"

# =============================================================================
# GENERAL PII — Financial, Employment, Travel, Education, Legal
# =============================================================================

  - id: financial_amount
    display_name: Transaction / Financial Amount
    description: "Dollar or currency amount in a financial transaction, payment, or account context. Example: '$12,450', '$18,700.00', '$219.96', '1002.00 USD'."
    policy: [general]
    enabled: true
    priority: 2
    gliner_label: "financial dollar amount"
    patterns:
      - '(\$\s*[\d,]+(?:\.\d{1,2})?)\b'
      - '((?:\d{1,3}(?:,\d{3})+|\d+)(?:\.\d{1,2})?)\s+(?:USD|EUR|GBP|CAD|AUD)\b'
    masking:
      strategy: redact
      format: "[AMOUNT {n}]"

  - id: card_type
    display_name: Payment Card Brand (Visa / Mastercard / Amex / Discover)
    description: "Payment card network brand ONLY: Visa, Mastercard, American Express, Discover, JCB, UnionPay. Do NOT flag automobile brands, clothing brands, or any non-payment-card brands."
    policy: [pci_dss]
    enabled: true
    priority: 3
    gliner_label: "payment card brand Visa Mastercard Amex"
    patterns:
      - '\b(Visa|Mastercard|Master\s*Card|American\s+Express|AmEx|AMEX|Discover|JCB|UnionPay)\b'
    masking:
      strategy: redact
      format: "[CARD TYPE {n}]"

  - id: card_last4
    display_name: Card Last 4 Digits
    description: "Last 4 digits of a payment card referenced as 'ending in XXXX' or 'last four digits XXXX'. Example: 'card ending in 8821', 'ending in 4451'."
    policy: [pci_dss]
    enabled: true
    priority: 2
    gliner_label: "last 4 digits of card number"
    patterns:
      - '(?:card|account)\s+ending\s+in\s+(\d{4})'
      - 'ending\s+in\s+(\d{4})'
      - 'last\s+(?:four|4)\s+(?:digits?)?\s*[:#]?\s*(\d{4})'
      # "Last Four: 8821" or "last 4: 4451"
      - 'last\s+(?:four|4)\s*[:#]\s*(\d{4})'
      # "card x-xxxx" or "card no. ending ####"
      - '(?:x{3,}[-–]|xxxx[-–])(\d{4})\b'
    masking:
      strategy: redact
      format: "[CARD LAST4 {n}]"

  - id: employee_id
    display_name: Employee ID / Staff Number
    description: "Employee identification number. Example: 'EMP-77421', 'EMPID-12345'. Detect near keywords: Employee ID, Staff ID, EMP."
    policy: [general]
    enabled: true
    priority: 1
    gliner_label: "employee ID number"
    patterns:
      - '\bEMP-[A-Za-z0-9\-]{3,12}\b'
      - '(?:Employee|Staff)\s+(?:ID|Number|No)\s*[:#=]?\s*(?:is\s+)?([A-Za-z0-9\-]{3,15})'
    masking:
      strategy: redact
      format: "[EMPLOYEE ID {n}]"

  - id: medication_name
    display_name: Prescription Medication / Drug Name with Dosage
    description: "Name of a prescribed medication, drug, or pharmaceutical treatment, typically with dosage. Example: 'Prednisone 20mg', 'Albuterol inhaler', 'Lisinopril 10mg daily', 'Metformin 500mg'."
    policy: [hipaa]
    enabled: true
    priority: 2
    confidence_threshold: 0.45
    gliner_label: "prescription medication name with dosage"
    patterns:
      # Known medication names with dosage
      - '((?:Prednisone|Metformin|Ibuprofen|Atorvastatin|Lisinopril|Amoxicillin|Omeprazole|Aspirin|Gabapentin|Levothyroxine|Amlodipine|Losartan|Albuterol|Sertraline|Furosemide|Simvastatin|Metoprolol|Warfarin|Clopidogrel|Hydrochlorothiazide|Enalapril|Ramipril|Pantoprazole|Esomeprazole|Ciprofloxacin|Azithromycin|Doxycycline|Tramadol|Oxycodone|Morphine|Codeine|Fentanyl|Hydrocodone|Acetaminophen|Naproxen|Celecoxib|Montelukast|Fluoxetine|Escitalopram|Duloxetine|Citalopram|Bupropion|Venlafaxine|Trazodone|Alprazolam|Clonazepam|Lorazepam|Zolpidem|Quetiapine|Aripiprazole|Risperidone|Olanzapine|Lithium|Lamotrigine|Valproate|Carbamazepine|Phenytoin|Levetiracetam|Topiramate|Diazepam|Clonidine|Prazosin|Spironolactone|Metformin|Glipizide|Glimepiride|Sitagliptin|Pioglitazone|Insulin|Lantus|Humalog|Novolog|Dexamethasone|Methylprednisolone|Hydrocortisone|Triamcinolone|Budesonide|Fluticasone|Mometasone|Cetirizine|Loratadine|Diphenhydramine|Ranitidine|Famotidine|Metoclopramide|Ondansetron|Promethazine|Amitriptyline|Nortriptyline|Doxepin|Imipramine|Clomipramine|Phenobarbital|Clonazepam|Diazepam|Baclofen|Cyclobenzaprine|Carisoprodol|Methocarbamol|Tizanidine|Atenolol|Carvedilol|Bisoprolol|Propranolol|Labetalol|Diltiazem|Verapamil|Nifedipine|Felodipine|Isosorbide|Nitroglycerin|Digoxin|Amiodarone|Sotalol|Apixaban|Rivaroxaban|Dabigatran|Heparin|Enoxaparin|Clopidogrel|Prasugrel|Ticagrelor|Rosuvastatin|Pravastatin|Fluvastatin|Lovastatin|Ezetimibe|Fenofibrate|Gemfibrozil|Niacin|Colchicine|Allopurinol|Febuxostat|Probenecid|Hydroxychloroquine|Methotrexate|Sulfasalazine|Leflunomide|Adalimumab|Etanercept|Infliximab|Rituximab|Adalimumab|Azathioprine|Mycophenolate|Tacrolimus|Cyclosporine|Prednisone|Methylprednisolone|Prednisolone|Dexamethasone|Betamethasone)\s+\d+(?:\.\d+)?(?:mg|mcg|g|ml|mL|IU|units?|mg/dl|mmol)(?:\/(?:day|dose|tablet|capsule))?\b)'
      # Generic pattern: Title-case drug name + dosage
      - '((?-i:[A-Z])[a-z]{3,}(?:in|ol|am|ide|ine|ate|one|il|ar|ex|en|ax|on|ab|mab|tinib|ciclovir|cycline|mycin|cillin|oxacin|azole|statin|pril|sartan|olol|dipine|prazole|tidine|setron)\s+\d+(?:\.\d+)?(?:mg|mcg|g|ml|mL|IU|units?))'
      # Formulation without dosage: "Albuterol inhaler"
      - '\b(Albuterol\s+inhaler)\b'
      - '\b((?-i:[A-Z])[a-z]{4,})\s+(?:inhaler|tablet|capsule|solution|suspension|cream|ointment|patch|spray|drops)\b'
    masking:
      strategy: redact
      format: "[MEDICATION {n}]"

  - id: vehicle_registration
    display_name: Vehicle Registration Number
    description: "Vehicle registration or license plate number. Example: 'TX-98-AB-2211', 'CA 7ABC123'. Different from VIN."
    policy: [general]
    enabled: true
    priority: 2
    gliner_label: "vehicle registration number"
    patterns:
      - '\b([A-Z]{2}-\d{2,3}-[A-Z]{2}-\d{3,4})\b'
      - '(?:License\s+Plate|Plate\s+No|Vehicle\s+Plate|Tag\s+No)\s*[:#]?\s*([A-Za-z0-9\-]{4,10})'
    masking:
      strategy: redact
      format: "[VEHICLE NUMBER {n}]"

  - id: student_id
    display_name: Student ID Number
    description: "Student identification number. Example: 'STU-551992'. Detect near keyword: Student ID."
    policy: [general]
    enabled: true
    priority: 1
    gliner_label: "student ID number"
    patterns:
      - '\bSTU-[A-Za-z0-9\-]{3,12}\b'
      - 'Student\s+(?:ID|Number|No)\s*[:#=]?\s*(?:is\s+)?([A-Za-z0-9\-]{3,15})'
    masking:
      strategy: redact
      format: "[STUDENT ID {n}]"

  - id: tax_id_number
    display_name: Tax Identification Number / TIN / EIN
    description: "Tax identification, employer identification, or individual taxpayer ID. Example: 'TAX-882119', 'EIN 12-3456789', 'TIN-123456789'. Capture the full token including label prefix."
    policy: [general]
    enabled: true
    priority: 1
    gliner_label: "tax ID EIN TIN"
    patterns:
      - '(\bEIN\s*[-:#=]?\s*\d{2}[-\s]\d{7})\b'
      - '(\bTIN[-:#=\s]\s*[A-Za-z0-9][A-Za-z0-9\-]{3,14})\b'
      - '(\bTAX[-\s]ID[-:#=\s]\s*[A-Za-z0-9][A-Za-z0-9\-]{3,14})\b'
      - '(Tax\s+(?:Identification|ID)\s+(?:Number|No)\s*[-:#=]\s*[A-Za-z0-9][A-Za-z0-9\-]{3,14})'
      - '\b(\d{2}-\d{7})\b'
    masking:
      strategy: redact
      format: "[TAX ID {n}]"

  - id: flight_number
    display_name: Flight Number
    description: "Airline flight number. Example: 'AI-442', 'BA-117', 'AA 100'. Detect near keyword: flight, flt."
    policy: [general]
    enabled: true
    priority: 2
    gliner_label: "airline flight number"
    patterns:
      - '(?:flight|flt\.?)\s+([A-Z]{2}[-\s]?\d{2,4})'
    masking:
      strategy: redact
      format: "[FLIGHT NUMBER {n}]"

  - id: booking_reference
    display_name: Booking / Reservation Reference
    description: "Hotel, flight, or travel booking reference number. Example: 'BK-771922', 'PNR: ABC123'. Detect near keyword: booking reference, reservation, PNR."
    policy: [general]
    enabled: true
    priority: 2
    gliner_label: "booking or reservation reference"
    patterns:
      - '(?:BK|Booking\s+(?:Reference|Ref|ID|Number)|Reservation\s+(?:ID|Number)|PNR)\s*[-:#]?\s*([A-Za-z0-9\-]{4,15})'
    masking:
      strategy: redact
      format: "[BOOKING ID {n}]"

  - id: claim_number
    display_name: Insurance Claim Number
    description: "Insurance claim number. Example: 'CLM-882901'. Detect near keyword: claim number, claim ID."
    policy: [general]
    enabled: true
    priority: 1
    gliner_label: "insurance claim number"
    patterns:
      - '(?:CLM|Claim\s+(?:Number|No|ID))\s*[-:#]?\s*([A-Za-z0-9\-]{4,15})'
    masking:
      strategy: redact
      format: "[CLAIM ID {n}]"

  - id: application_id
    display_name: Government Application / Reference Number
    description: "Government or official application reference number. Example: 'GOV-551882', 'APP-12345'. Detect near keyword: application number, reference number, GOV."
    policy: [general]
    enabled: true
    priority: 1
    gliner_label: "application ID or government reference number"
    patterns:
      # Include full APP-XXXXXX token (prefix + number) in the capture group
      - '(\bAPP-[A-Za-z0-9\-]{4,15})\b'
      - '(\bGOV-[A-Za-z0-9\-]{4,15})\b'
      - '(?:Application\s+(?:Number|No|ID)|Reference\s+(?:Number|No|ID))\s*[-:#]?\s*([A-Za-z0-9\-]{4,15})'
      - '(?:Clinical\s+Trial\s+Participant\s+ID|Parking\s+Permit\s+(?:ID|Number))\s*[:#]?\s*([A-Za-z0-9\-]{4,15})'
      - '\bPP-\d{4,12}\b'
    masking:
      strategy: redact
      format: "[APPLICATION ID {n}]"

# ── Organisation subtypes (more specific than organization_name) ──────────────

  - id: hospital_name
    display_name: Hospital / Medical Center / Clinic Name
    description: "Name of a hospital, medical center, health system, clinic, or other healthcare facility. Example: 'Westside Medical Center', 'Valley Diagnostics Laboratory', 'Pacific Bay Medical Center'."
    policy: [hipaa]
    enabled: true
    priority: 1
    gliner_label: "hospital or medical center name"
    patterns:
      # Standard capitalized words (2-5) + medical suffix
      - '\b((?:(?-i:[A-Z])[A-Za-z]+[ \t]+){2,5}(?:Medical[ \t]+Center|Hospital|Health[ \t]+System|Clinic|Medical[ \t]+Group|Healthcare|Diagnostics?[ \t]+(?:Lab(?:oratory)?|Center)|Radiology[ \t]+(?:Center|Associates)|Medical[ \t]+Institute|Health[ \t]+Center|Health[ \t]+Group|Wellness[ \t]+Center))\b'
      # Names with "and" or "&" connector: "Martinez and Sons Medical Center"
      - '\b((?:(?-i:[A-Z])[A-Za-z\-]+[ \t]+){1,4}(?:and[ \t]+|&[ \t]+)?(?:(?-i:[A-Z])[A-Za-z\-]+[ \t]+){0,3}(?:Medical[ \t]+Center|Hospital|Health[ \t]+System|Clinic|Medical[ \t]+Group|Healthcare|Medical[ \t]+Institute|Health[ \t]+Center|Health[ \t]+Group))\b'
      # "Women's Health Clinic: Grace Women's Clinic"
      - '(?:Clinic|Center)\s*:\s*((?:(?-i:[A-Z])[\w'']+(?:\s+(?-i:[A-Z])[\w'']+){1,6})\s+Clinic)'
      - '(?:REHAB\s+CENTER-ID|Emergency\s+case\s+transferred\s+to|Therapy\s+sessions\s+ongoing\s+at|Dental\s+records\s+updated\s+from)\s*[:#]?\s*((?:(?-i:[A-Z])[A-Za-z'']+(?:\s+(?-i:[A-Z])[A-Za-z'']+){1,5})\s+(?:Center|Clinic|Hospital))'
    masking:
      strategy: redact
      format: "[HOSPITAL {n}]"

  - id: bank_name
    display_name: Bank / Financial Institution Name
    description: "Name of a bank, credit union, or financial institution. Example: 'City National Bank', 'Chase', 'Wells Fargo', 'Bank of America'."
    policy: [pci_dss]
    enabled: true
    priority: 3
    gliner_label: "bank or financial institution name"
    patterns:
      - '\b((?:(?-i:[A-Z])[A-Za-z]+[ \t]+){1,4}(?:Bank|Credit[ \t]+Union|Financial|Savings|Trust|Bancorp))\b'
      - '\b(Chase|Wells\s+Fargo|Citibank|Bank\s+of\s+America|HSBC|Barclays|TD\s+Bank|Capital\s+One|PNC|US\s+Bank|SunTrust|BB&T|Fidelity|Schwab|Vanguard)\b'
    masking:
      strategy: redact
      format: "[BANK {n}]"

  - id: insurance_company_name
    display_name: Insurance Company Name
    description: "Name of an insurance company or provider. Example: 'United Shield Insurance', 'Blue Cross Blue Shield', 'Aetna', 'UnitedHealth'. Do NOT flag phrases like 'her insurance', 'his insurance', 'their insurance', 'the insurance', 'my insurance'. Must be a proper company name."
    policy: [general]
    enabled: true
    priority: 3
    confidence_threshold: 0.92
    gliner_label: "insurance company proper name like Aetna Blue Cross Cigna Humana"
    patterns:
      # Require 2+ proper-noun words before Insurance keyword to avoid "Her insurance", "His insurance"
      - '\b((?:(?-i:[A-Z])[A-Za-z]+[ \t]+){2,4}(?:Insurance|Ins\.|Assurance|Mutual|Underwriters?))\b'
      # Well-known insurers by name
      - '\b(Aetna|UnitedHealth(?:care)?|Cigna|Humana|Anthem|Blue\s+Cross(?:\s+Blue\s+Shield)?|Blue\s+Shield|Kaiser(?:\s+Permanente)?|Molina|Centene|MetLife|Prudential|Allstate|State\s+Farm|GEICO|Progressive|Travelers|BlueCross|BCBS)\b'
    masking:
      strategy: redact
      format: "[INSURANCE COMPANY {n}]"

  - id: university_name
    display_name: University / College Name
    description: "Name of a university, college, or academic institution. Example: 'Northern State University', 'MIT', 'Harvard University'."
    policy: [general]
    enabled: true
    priority: 3
    gliner_label: "university or college name"
    patterns:
      - '\b((?:(?-i:[A-Z])[A-Za-z]+[ \t]+){1,5}(?:University|College|Institute[ \t]+of[ \t]+Technology|School[ \t]+of|Academy))\b'
    masking:
      strategy: redact
      format: "[UNIVERSITY {n}]"

  - id: law_firm_name
    display_name: Law Firm / Legal Practice Name
    description: "Name of a law firm, legal practice, or attorney's office. Example: 'Grant & Associates', 'Smith & Jones LLP'."
    policy: [general]
    enabled: true
    priority: 3
    gliner_label: "law firm name"
    patterns:
      - '\b((?-i:[A-Z])[A-Za-z]*(?:[ \t]+(?:&[ \t]+)?(?-i:[A-Z])[A-Za-z]*){0,4}[ \t]+(?:LLP|LLC|Law[ \t]+(?:Firm|Group|Office|Practice)|Attorneys?[ \t]+at[ \t]+Law|&[ \t]+Associates))\b'
    masking:
      strategy: redact
      format: "[LAW FIRM {n}]"

  - id: court_name
    display_name: Court / Judicial Body Name
    description: "Name of a court or judicial body. Example: 'California Superior Court', 'US District Court', 'Family Court'."
    policy: [general]
    enabled: true
    priority: 3
    gliner_label: "court name"
    patterns:
      - '\b((?:(?-i:[A-Z])[A-Za-z]+[ \t]+){1,4}(?:Superior[ \t]+Court|District[ \t]+Court|Circuit[ \t]+Court|Court[ \t]+of[ \t]+Appeals?|Supreme[ \t]+Court|Family[ \t]+Court|Municipal[ \t]+Court|Probate[ \t]+Court))\b'
    masking:
      strategy: redact
      format: "[COURT {n}]"

  - id: hotel_name
    display_name: Hotel / Accommodation Name
    description: "Name of a hotel, resort, or accommodation. Example: 'Grand Royal Hotel', 'Marriott Downtown', 'Hilton Garden Inn'."
    policy: [general]
    enabled: true
    priority: 3
    gliner_label: "hotel or accommodation name"
    patterns:
      # Standard: 1-4 capitalized words + hotel suffix
      - '\b((?:(?-i:[A-Z])[A-Za-z]+[ \t]+){1,4}(?:Hotel|Resort|Inn|Suites?|Lodge|Motel|Hostel|Bed[ \t]+and[ \t]+Breakfast))\b'
      # With comma/and connectors: "Morse, Gonzales and Harrison Hotel"
      - '\b((?:(?-i:[A-Z])[A-Za-z]+(?:[,]?[ \t]+(?:and[ \t]+)?)?){2,6}(?:Hotel|Resort|Inn|Suites?|Lodge|Motel))\b'
      - '\b(Marriott|Hilton|Hyatt|Sheraton|Westin|IHG|Holiday\s+Inn|Best\s+Western|Radisson|Ritz[-\s]Carlton|Four\s+Seasons|Starwood)\b'
    masking:
      strategy: redact
      format: "[HOTEL {n}]"
