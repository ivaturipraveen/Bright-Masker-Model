  - (?:MEMBER\s+(?:ID|NO|NUMBER|#)|GROUP\s+(?:ID|NO|NUMBER|#)|SUBSCRIBER\s+(?:ID|NO|NUMBER|#)|BENEFICIARY\s+(?:ID|NO|NUMBER|#))\s*[:#]?\s*([A-Za-z0-9][A-Za-z0-9\-]{3,19})
  masking:
    strategy: redact
    format: '[INSURANCE ID {n}]'
- id: insurance_policy_number
  display_name: Insurance Policy Number
  description: 'Insurance policy number. Detect based on keyword: Policy Number, Insurance Policy, Policy #. POL- prefix always indicates an insurance policy number.'
  policy:
  - hipaa
  enabled: true
  priority: 2
  gliner_label: insurance policy number
  patterns:
  - (?:Policy\s+(?:Number|No|#)\s*[:#]?\s*)([A-Za-z0-9\-]{4,20})
  - \bPOL-[A-Za-z0-9\-]{4,20}\b
  - (?:Health|Life|Auto|Travel|Family|Government|Claim|Member|Group|Corporate|Dental|Employer\s+Coverage|Accident|Property|Vehicle)\s+Insurance\s+(?:Policy|Plan)?\s*(?:ID|Number|No|#)?\s*[:#]?\s*([A-Za-z0-9\-]{4,20})
  - \b(?:PN|IPID|HIP|LIP|AIP|PRN|MIP|TIP|RPN|MBI|SPN|GIP|IEN|PCP|CIP|FIP|SIP|DIP|ECP|ACP|CORP)-[A-Za-z0-9\-]{4,20}\b
  - (?:POLICY\s*#?|INSURANCE\s+POLICY[-\s]?ID|LIFE\s+INSURANCE#?|AUTO\s+POLICY[-\s]?ID|HEALTH\s+POLICY[-\s]?ID)\s*[:#]?\s*([A-Za-z0-9][A-Za-z0-9\-]{3,19})
  - (?:Policy\s+Enrollment|Coverage\s+ID|Coverage\s+Number|Insurance\s+Enrollment\s+Number|Plan\s+ID)\s*[:#]?\s*([A-Za-z0-9\-]{4,20})
  masking:
    strategy: redact
    format: '[INSURANCE POLICY {n}]'
- id: billing_number
  display_name: Billing Number
  description: 'Patient or account billing number. Flag the VALUE that follows keywords: Billing Number, Billing No, Bill No, BILLING NO, billing account. Example: in ''BILLING NO:8646139'' flag ''8646139'',
    in ''billing account BL-9910274'' flag ''BL-9910274''.'
  policy:
  - hipaa
  enabled: true
  priority: 1
  gliner_label: billing number
  patterns:
  - BILLING\s*NO\.?\s*[:#]?\s*(\d{4,12})
  - Billing\s+(?:Number|No|Code|Statement\s+No)\s*[:#]?\s*([A-Za-z0-9\-]{4,20})
  - Bill\s+No\s*[:#]?\s*(\d{4,12})
  - billing\s+account\s*[:#]?\s*([A-Z]{1,4}-[\d]{4,12})\b
  - (?:Invoice\s+Billing\s+Number|Customer\s+Billing\s+ID|Monthly\s+Billing\s+Number|Utility\s+Billing\s+Number|Hospital\s+Billing\s+Number|Telecom\s+Billing\s+Number|Payment\s+Billing\s+Number|Subscription\s+Billing\s+Number|Mobile\s+Billing\s+Number)\s*[:#]?\s*([A-Za-z0-9\-]{4,20})
  - \b(?:INV-)?BILL-\d{4,12}\b
  - \bHB-\d{4}-\d{4}\b
  - \b(?:MBN|UBN|PBN|BS|BRN|SUB|TAX-BN|SBR|MOB)-[A-Za-z0-9\-]{4,20}\b
  - \bBC\d{4,12}\b
  - \b(?:CB|CORP-BILL|TEL|HB|TAX-BN|CB-MOB|MOB|MBN|UBN|HB|BS|PBN|SUB|SBR|BRN|UTIL|CORP|HOSP|TELE)-[A-Za-z0-9\-]{4,20}\b
  - \b(BILL-(?:19|20)\d{2}-\d{2,6})\b
  - \b(BC\d{5,9})\b
  - \b(SBR-(?:19|20)\d{2}-\d{2,6})\b
  - (?:Invoice|Statement|Customer|Tax|Corporate|Mobile|Hospital|Utility|Telecom|Subscription|Payment|Monthly|Annual)\s+Billing\s+(?:Number|ID|No|Code|Statement\s+No)\s*[:#]?\s*([A-Z0-9][A-Z0-9\-]{3,19})
  masking:
    strategy: redact
    format: '[BILLING NO {n}]'
- id: medical_license_number
  display_name: Medical License / Certificate Number
  description: 'State medical license number or professional certificate number for healthcare providers. HIPAA Safe Harbor #11. Detect near keywords: Medical License, License No, State License, Certificate
    Number.'
  policy:
  - hipaa
  enabled: true
  priority: 1
  gliner_label: medical license number
  patterns:
  - (?:Medical|Clinical|State|Professional)\s+License\s*(?:Number|No|#)?\s*[:#]?\s*([A-Za-z0-9\-]{4,15})
  - License\s+(?:Number|No)\s*[:#]?\s*([A-Za-z0-9\-]{4,15})
  - Certificate\s+(?:Number|No)\s*[:#]?\s*([A-Za-z0-9\-]{4,15})
  - \b(ML-[A-Za-z0-9]{4,12})\b
  - \b(ML-[A-Z]{2}-[A-Za-z0-9]{4,12})\b
  - (?:Practitioner\s+License\s+ID|Medical\s+Board\s+Registration\s+Number|Physician\s+Registration\s+ID|Telemedicine\s+Practitioner\s+License|Resident\s+Doctor\s+License\s+ID)\s*[:#]?\s*([A-Za-z0-9\-]{4,15})
  - \b(?:PLI|MBR|PLN|SML|HPL|CLN|SLN|HPR|MCN|PRI|MCL|PML|HPI|DRC|NML|PMC|TPL|RDL)-[A-Za-z0-9\-]{4,15}\b
  - \b(?:SPL|HPL|MCL|PMC|RDL|TPL|CLN|MBR|HPR|PLI|PRI|HPI|SML|PLN)-[A-Za-z0-9\-]{4,15}\b
  - (?:Pharmacy|Nursing|RN|LPN|NP|PA|DO|DDS|DMD)\s+License\s*(?:Number|No|#)?\s*[:#]?\s*([A-Za-z0-9\-]{4,15})
  - \b([A-Z]{2}-(?:PHY|MED|RN|LPN|DEN|PHARM)-[A-Za-z0-9\-]{4,12})\b
  - (?:Provider\s+License|License\s+Verification|Board\s+Certification)\s+(?:Number|No|#|ID)?\s*[:#]?\s*([A-Za-z0-9\-]{4,15})
  masking:
    strategy: redact
    format: '[MED LICENSE {n}]'
- id: dea_number
  display_name: DEA Registration Number
  description: 'DEA controlled substance registration number. Format: 2 letters + 7 digits. Flag the VALUE, NOT the label ''DEA''.'
  policy:
  - hipaa
  enabled: true
  priority: 1
  gliner_label: DEA registration number
  patterns:
  - \bDEA\s+(?:(?:Registration|Identifier|Authorization|Compliance|Prescribing)\s+)?(?:Number|No|#)?\s*[:#]?\s*([A-Za-z]{2}\d{7})\b
  - (?:PRESCRIBER\s+DEA\s+ID|Medical\s+Practice\s+DEA\s+ID|Pharmacy\s+DEA\s+Verification\s+Number|DEA\s+Controlled\s+Drug\s+Authorization)\s*[:#]?\s*([A-Za-z]{2}\d{7})\b
  - (?:The\s+)?DEA\s+(?:number\s+is\s+)?([A-Za-z]{2}\d{7})\b
  - ([A-Za-z]{2}\d{7})\s+for\s+dea\s+number
  - (?<![A-Za-z0-9])((?:[ABCDEFGHJKLMNPRSTUX][A-Z])\d{7})(?![A-Za-z0-9])
  - (?:Prescriber|Pharmacy|Medical\s+Practice|Controlled\s+Drug)\s+\S*\s*[:#]?\s*([A-Z]{2}\d{7})\b
  masking:
    strategy: redact
    format: '[DEA NUMBER {n}]'
- id: npi_number
  display_name: National Provider Identifier (NPI)
  description: Healthcare provider NPI — exactly 10 digits following keyword NPI. HIPAA-covered provider identifier. Flag the 10-digit VALUE, NOT the label 'NPI' itself.
  policy:
  - hipaa
  enabled: true
  priority: 1
  gliner_label: NPI provider number
  patterns:
  - \b(NPI\s*[-:#]?\s*\d{10})\b
  - (National\s+Provider\s+Identifier\s*[:#]?\s*\d{10})
  - (\bNPI-\d{10})\b
  masking:
    strategy: redact
    format: '[NPI {n}]'
- id: passport_number
  display_name: Passport Number
  description: 'Passport or travel document number. Example: X1234567 (letter + 7 digits), P9876543. Detect after keywords: Passport Number, Passport No, Passport:, Passport #.'
  policy:
  - hipaa
  enabled: true
  priority: 1
  gliner_label: passport number
  presidio_type: US_PASSPORT
  patterns:
  - Passport\s+(?:Number|No|#)\s*[:#]?\s*([A-Za-z][A-Za-z0-9]{5,10})
  - Passport\s+(?:Number|No|#)\s*[:#]?\s*(\d{9})
  - Passport\s*:\s*([A-Za-z][A-Za-z0-9]{5,10})
  - Passport\s*:\s*(\d{9})
  - (?:Passport\s+Identification\s+Number|Government\s+Passport\s+Number|Citizen\s+Passport\s+ID|Diplomatic\s+Passport\s+Number|Official\s+Passport\s+ID|Machine\s+Readable\s+Passport\s+Number|Biometric\s+Passport\s+Number|Temporary\s+Passport\s+ID|Electronic\s+Passport\s+Number|National\s+Passport\s+Registration\s+Number|Overseas\s+Passport\s+Number)\s*[:#]?\s*([A-Za-z0-9\-]{4,15})
  - \b(?:PID|GP|CPI|DP|OPI|MRP|BP|TP|EP|NPR|IP|OPN|CPN|STP|INT)-[A-Za-z0-9\-]{4,15}\b
  - \bPassport\s+([A-Za-z][0-9]{7,8})\b
  - \b(?:IND|CAN|EUP|RTP|ICP|UK|USA|AUS|NZ|JPN|RUS|BRA|MEX|CHN|FP)-[A-Za-z0-9\-]{4,15}\b
  - (?:Indian|Canadian|EU|European|Refugee|International|US|British|Australian|Japanese|Russian|Chinese|Brazilian|Mexican)\s+(?:Travel\s+)?(?:Citizen\s+)?Passport\s+(?:Number|ID|No|#)?\s*[:#]?\s*([A-Za-z0-9\-]{4,15})
  - (?<![A-Za-z0-9])([A-Z]{1,2}\d{6,8})(?![A-Za-z0-9])
  - (?:Diplomatic|Temporary|Biometric|Electronic|Machine\s+Readable|Overseas|Government|Official|Foreign)\s+Passport\s+(?:Number|ID|No|#)?\s*[:#]?\s*([A-Za-z0-9\-]{4,15})
  masking:
    strategy: redact
    format: '[PASSPORT {n}]'
- id: drivers_license
  display_name: Driver's License Number
  description: 'Driver license number. Format varies by state. Example: D123-456-7890, DL-000003. Capture the full token including any DL- prefix.'
  policy:
  - hipaa
  enabled: true
  priority: 1
  gliner_label: driver's license number
  presidio_type: US_DRIVER_LICENSE
  patterns:
  - (?:Driver's?\s+License\s*[:#]?\s*)([A-Za-z0-9\-]{6,18})
  - (\bDL[-\s]*[A-Za-z0-9][A-Za-z0-9\-]{4,17})\b
  - (?:Learner\s+Permit\s+Number|Driving\s+Permit\s+ID|International\s+Driving\s+Permit\s+Number)\s*[:#]?\s*([A-Za-z0-9\-]{6,18})
  - DL#\s*([A-Za-z0-9\-]{6,18})
  - LICENSE[-\s]*ID\s*[:#]?\s*([A-Za-z0-9\-]{6,18})
  - \b(?:LIC|DRV|MVL|SDL|CDL|LP|OL|DP|VOL|LID|TDL|SIL|DMV|DCN|RL|IDP)-[A-Za-z0-9\-]{4,18}\b
  - (?:DL|Driver(?:'s)?\s+License|Driving\s+License)\s*(?:Number|No|#)?\s*[:#]?\s*([A-Z]\d{8,10})\b
  - (?:DL|Driver(?:'s)?\s+License|Driving\s+License)\s*(?:Number|No|#)?\s*[:#]?\s*([A-Z]\d{3}-\d{4}-\d{4})\b
  - \bDL#\s*([A-Z]\d{8,10})\b
  - \b(CDL-[A-Z]-\d{4,10})\b
  - (?<![A-Za-z0-9])([A-Z]\d{8,10})(?![A-Za-z0-9])
  - (?<![A-Za-z0-9])(D[A-Z]{2}\d{8})(?![A-Za-z0-9])
  - (?:drivers?\s+licen[sc]e)\s+(?:is\s+|number\s+|no\.?\s+|#\s*)?([A-Z]{1,3}\d{6,10})\b
  masking:
    strategy: redact
    format: '[DRIVERS LICENSE {n}]'
- id: vehicle_vin
  display_name: Vehicle Identification Number (VIN)
  description: '17-character vehicle identification number. Example: 1HGCM82633A004352. ISO 3779: excludes I, O, Q to avoid digit confusion.'
  policy:
  - hipaa
  - transportation
  enabled: true
  priority: 2
  gliner_label: vehicle identification number VIN
  patterns:
  - (?:Vehicle\s+)?VIN\s*[:#]?\s*([A-HJ-NPR-Z0-9]{17})\b
  - (?:Vehicle\s+Identification\s+Number)\s*[:#]?\s*([A-HJ-NPR-Z0-9]{8,17})\b
  - \b([A-HJ-NPR-Z0-9]{17})\b
  - (?:Insurance\s+Vehicle\s+VIN|Registered\s+Vehicle\s+VIN|Electric\s+Vehicle\s+VIN|Commercial\s+Vehicle\s+VIN|Truck\s+VIN|Car\s+VIN|Motorcycle\s+VIN)\s*[:#]?\s*([A-HJ-NPR-Z0-9]{17})\b
  - (?:REGISTERED\s+VIN#?|VEHICLE\s+VIN[-\s]?ID|CAR\s+VIN#?|TRUCK\s+VIN[-\s]?ID|INSURANCE\s+VIN#?)\s*[:#]?\s*([A-HJ-NPR-Z0-9]{17})\b
  masking:
    strategy: redact
    format: '[VIN {n}]'
- id: license_plate
  display_name: License Plate Number
  description: Vehicle license plate number ONLY. Detect ONLY when keyword 'license plate', 'plate number', 'vehicle plate', or 'tag number' is explicitly present. Do NOT tag driver license numbers, dates,
    case numbers, or any identifier without the explicit license plate keyword.
  policy:
  - hipaa
  - transportation
  enabled: true
  priority: 2
  confidence_threshold: 0.97
  gliner_label: vehicle license plate number
  patterns:
  - (?:license\s+plate|plate\s+(?:number|no\.?|#)|vehicle\s+plate|tag\s+number)\s*[:#]?\s*([A-Z0-9]{1,3}[\s\-][A-Z0-9]{2,4})\b
  - (?:license\s+plate|plate\s+(?:number|no\.?|#)|vehicle\s+plate|tag\s+number)\s*[:#]?\s*([A-Z0-9]{1,3}[\s\-][A-Z0-9]{2,4}[\s\-][A-Z0-9]{1,4})\b
  - (?:license\s+plate|plate\s+(?:number|no\.?|#)|vehicle\s+plate|tag\s+number)\s*[:#]?\s*([A-Z]{2}-\d{3,6})
  - (?:license\s+plate|plate\s+(?:number|no\.?|#)|vehicle\s+plate|tag\s+number)\s*[:#]?\s*([A-Z0-9]{5,8})
  - \b((?:AP|AR|AS|BR|CG|GA|GJ|HR|HP|JH|KA|KL|MP|MH|MN|ML|MZ|NL|OD|PB|RJ|SK|TN|TS|TR|UP|UK|WB|AN|CH|DD|DN|DL|JK|LA|LD|PY)\d{1,2}[A-Z]{1,3}\d{3,4})\b
  - \b((?:AP|AR|AS|BR|CG|GA|GJ|HR|HP|JH|KA|KL|MP|MH|MN|ML|MZ|NL|OD|PB|RJ|SK|TN|TS|TR|UP|UK|WB|AN|CH|DD|DN|DL|JK|LA|LD|PY)\s\d{1,2}\s[A-Z]{1,3}\s\d{3,4})\b
  - \b([A-Z]{2}\d{2}\s[A-Z]{3})\b
  - (?:Temporary\s+Plate\s+Number|State\s+Registration\s+Plate|Motorcycle\s+Plate\s+Number|Auto\s+Registration\s+Number|Commercial\s+Plate|Transport\s+Vehicle\s+Registration|UK\s+Registration\s+Plate)\s*[:#-]?\s*([A-Z0-9]{2,4}[\s-]?[A-Z0-9]{2,8})\b
  - \b((?:TEMP|NYK|TX|CAB|FLT|PRK|DIP)-[A-Z0-9]{4,8})\b
  - (?<![A-Za-z0-9])([A-Z]{3}-\d{4})(?![A-Za-z0-9])
  - (?<![A-Za-z0-9])([A-Z]{2}\d{4})(?![A-Za-z0-9])
  - \b([A-Z]{2,3}[\s-]?\d{3,4})\s+(?:for\s+)?(?:license\s+plate|plate\s+number)
  masking:
    strategy: redact
    format: '[LICENSE PLATE {n}]'
- id: device_identifier
  display_name: Device Identifier / MAC Address / IMEI
  description: 'Hardware device identifiers: MAC address (AA:BB:CC:DD:EE:FF), IMEI number (15 digits, e.g. 490154203237518), device serial number. Detect standalone 15-digit numbers after ''Device identifier:''
    keyword.'
  policy:
  - hipaa
  enabled: true
  priority: 1
  gliner_label: MAC address IMEI device identifier serial number
  patterns:
  - ([0-9A-Fa-f]{2}(?:[:\-][0-9A-Fa-f]{2}){5})
  - \bIMEI[-\s]*[:#]?\s*(\d{8,15})\b
  - \bIMEI-([A-Za-z0-9\-]{6,20})\b
  - (?:Device\s+(?:ID|identifier|serial|Registration\s+Number|Tracking\s+Number))\s*[:#]?\s*([A-Za-z0-9\-]{4,20})
  - (?:Cardiac\s+Implant\s+Device\s+Serial\s+Number|Pacemaker\s+Model\s+Number|Device\s+Tracking\s+Number|Patient\s+Monitoring\s+Device\s+ID|Wearable\s+Health\s+Device\s+Serial|Unique\s+Device\s+Identifier|Hardware\s+Identifier|Endpoint\s+Device\s+ID|Electronic\s+Device\s+Identifier|Asset\s+Device\s+Number|IoT\s+Device\s+Identifier|Mobile\s+Device\s+ID|Computer\s+Device\s+Number|Tracking\s+Device\s+ID|Sensor\s+Device\s+Identifier|Network\s+Device\s+Identifier|Device\s+Serial\s+Identifier|Embedded\s+Device\s+ID|Digital\s+Device\s+Identifier|Authentication\s+Device\s+ID|Enterprise\s+Device\s+Identifier|Cloud\s+Device\s+Registration\s+ID|Secure\s+Endpoint\s+Device\s+ID|Virtual\s+Device\s+Identifier|Remote\s+Device\s+Authentication\s+ID|Industrial\s+Device\s+Tracking\s+Number)\s*[:#]?\s*([A-Za-z0-9\-]{4,20})
  - \b(?:DEV|DVC|UDI|HW|TERM|END|EDI|ADN|IOT|MD|CDN|TDI|SDI|DRN|NDI|DSI|EBD|DDI|ADI|IMPL|DTN|PMD|WH|PM|DEVICE|CDR|SED|VDI|RDA|IDT)-[A-Za-z0-9\-]{4,20}\b
  - \b([0-9A-Fa-f]{2}-[0-9A-Fa-f]{2}-[0-9A-Fa-f]{2}-[0-9A-Fa-f]{2}-[0-9A-Fa-f]{2}-[0-9A-Fa-f]{2})\b
  - \b([0-9A-Fa-f]{4}\.[0-9A-Fa-f]{4}\.[0-9A-Fa-f]{4})\b
  - (?<!\d)(\d{15})(?!\d)
  - \b(MEID[-:#\s]*[0-9A-Fa-f]{14})\b
  - \b(ESN[-:#\s]*[0-9A-Fa-f]{8,11})\b
  - \bANDROID[_\-]?ID\s*[:#=]?\s*([0-9a-fA-F]{16})\b
  - \b(?:GAID|IDFA|ADID)\s*[:#=]?\s*([0-9a-fA-F]{8}-(?:[0-9a-fA-F]{4}-){3}[0-9a-fA-F]{12})\b
  - \bUDID\s*[:#=]?\s*([0-9a-fA-F]{40})\b
  - \b(?:EDI|CDR|SED|VDI|RDA|IDT|EDR|CLD|VRT|RMT|IND-DEV)-[A-Za-z0-9\-]{4,20}\b
  masking:
    strategy: redact
    format: '[DEVICE ID {n}]'
- id: url_with_pii
  display_name: URL with PII
  description: Flag actual URL values (http/https) that carry personal information — either via PII query parameters (ssn, email, phone, dob, mrn, lat/lng, etc.) or sensitive domain (health/hospital/medical/clinic/patient/portal/ehr).
    NOT the label word 'URL' itself.
  policy:
  - hipaa
  enabled: true
  priority: 3
  confidence_threshold: 0.8
  gliner_label: URL with personal information
  patterns:
  - (https?://\S+)
  - (?:https?://)?(?:www\.)?([a-z0-9][-a-z0-9.]*healthrecords\.com)\b
  - (?:https?://)?(?:www\.)?([a-z0-9][-a-z0-9.]*(?:health|hospital|medical|clinic|patient)[a-z0-9.-]*\.(?:com|org|net))\b
  - (?:URL\s+with\s+PII|Personal\s+Data\s+URL|PII\s+URL|Sensitive\s+URL|Tracking\s+URL\s+with\s+PII|Medical\s+Record\s+URL|Account\s+Recovery\s+URL|Geo\s+Location\s+URL|Prescription\s+URL|Document\s+Sharing\s+URL|Healthcare\s+Portal\s+URL|Secure\s+Login\s+URL|Taxpayer\s+URL|Support\s+Ticket\s+URL|URL)\s*[:#]?\s*(https?://\S+)
  - (?:URL#?|PII[-\s]?URL#?|SENSITIVE\s+LINK[-\s]?ID|HEALTH\s+RECORD\s+URL#?|LOGIN\s+URL[-\s]?ID|SUPPORT\s+TICKET\s+URL|MEDICAL\s+URL#?|GEO\s+URL[-\s]?ID)\s*[:#]?\s*(https?://\S+)
  - (https?://[^\s?#]+\?[^\s]*\b(?:ssn|email|phone|dob|mrn|tin|tax_id|patient|customer|user|username|name|firstname|lastname|address|lat|lng|longitude|latitude|card|token|password|api_key)=[^\s]+)
  masking:
    strategy: redact
    format: '[URL {n}]'
- id: ip_address
  display_name: IP Address
  description: Flag only the actual IP value in format NNN.NNN.NNN.NNN or IPv6 (e.g. 192.168.1.105). NOT the label word 'IP' or 'IP Address' itself.
  policy:
  - hipaa
  enabled: true
  priority: 1
  confidence_threshold: 0.9
  gliner_label: IP address
  presidio_type: IP_ADDRESS
  patterns:
  - (?:Device\s+IP\s+Address|IP\s+Address)\s*[:#]?\s*((?:\d{1,3}\.){3}\d{1,3})
  - (?:Device\s+IP\s+Address|IP\s+Address)\s*[:#]?\s*((?:[0-9a-fA-F]{0,4}:){2,7}[0-9a-fA-F]{0,4})
  - (?:Device\s+IP\s+Address|IP\s+Address)\s*[:#]?\s*(fe80::[0-9a-fA-F:]+)
  - (?:Device\s+IP\s+Address|IP\s+Address)\s*[:#]?\s*(::1)\b
  - \b((?:(?:25[0-5]|2[0-4]\d|[01]?\d\d?)\.){3}(?:25[0-5]|2[0-4]\d|[01]?\d\d?))\b
  - (?<![\w:])((?:[A-Fa-f0-9]{1,4}:){7}[A-Fa-f0-9]{1,4})(?![\w:])
  - (?<![\w:])((?:[A-Fa-f0-9]{1,4}:){1,7}:|(?:[A-Fa-f0-9]{1,4}:){1,6}:[A-Fa-f0-9]{1,4}|(?:[A-Fa-f0-9]{1,4}:){1,5}(?::[A-Fa-f0-9]{1,4}){1,2}|(?:[A-Fa-f0-9]{1,4}:){1,4}(?::[A-Fa-f0-9]{1,4}){1,3}|(?:[A-Fa-f0-9]{1,4}:){1,3}(?::[A-Fa-f0-9]{1,4}){1,4}|(?:[A-Fa-f0-9]{1,4}:){1,2}(?::[A-Fa-f0-9]{1,4}){1,5}|[A-Fa-f0-9]{1,4}:(?::[A-Fa-f0-9]{1,4}){1,6})(?![\w:])
  - (?<![\w:])(::(?:[A-Fa-f0-9]{1,4}(?::[A-Fa-f0-9]{1,4})*)?)(?![\w:])
  - (?<![\w:])(fe80:(?::[A-Fa-f0-9]{1,4}){0,4}%[A-Za-z0-9]+)(?![\w:])
  masking:
