      - '\b(SPL-[\d\-]{3,12})\b'
      - '\b(SLP-[\d\-]{4,12})\b'
      - '\b((?-i:[A-Z]{2,6})-\d{3,}(?:-\d{1,6})*)\b'
    masking:
      strategy: redact
      format: "[STOLEN PLATE {n}]"

  - id: stolen_boats
    display_name: Stolen Boats Record
    description: "Stolen boat or watercraft report. Detect based on keyword: stolen boat, stolen vessel"
    policy: [law_enforcement]
    enabled: true
    priority: 1
    gliner_label: "stolen boat or vessel report"
    patterns:
      - '(?:stolen\s+(?:boat|vessel|watercraft))\s*(?:reg(?:istration)?|report|#|number)?\s*[:#]?\s*([A-Z0-9\-]{4,20})'
      - '\b(SB-[\d\-]{4,14})\b'
