    patterns:
      - 'FBI\s+(?:Number|No|#|ID)\s*[:#]?\s*([A-Za-z0-9\-]{4,16})'
      # Direct FBI-XXXXXX format
      - '\bFBI-([A-Za-z0-9]{4,12})\b'
      - '\b(FBI-\d{4,15})\b'
      - '\b((?-i:[A-Z]{2,6})-\d{3,}(?:-\d{1,6})*)\b'
