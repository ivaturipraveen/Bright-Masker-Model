      - '(?:stolen\s+(?:gun|firearm)|NCIC\s+firearm)\s*(?:report|#|number)?\s*[:#]?\s*([A-Z0-9\-]{4,20})'
      - '\b(SG-[\d\-]{4,14})\b'
      - '\b((?-i:[A-Z]{2,6})-\d{3,}(?:-\d{1,6})*)\b'
    masking:
      strategy: redact
      format: "[STOLEN GUNS {n}]"

  - id: stolen_license_plate
