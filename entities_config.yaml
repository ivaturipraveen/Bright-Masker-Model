      strategy: redact
      format: "[FBI NUMBER {n}]"

  - id: chri
    display_name: Criminal History Record Information (CHRI)
    description: "Criminal history record information. Detect based on keyword: CHRI, criminal history, rap sheet"
    policy: [law_enforcement]
    enabled: true
    priority: 1
    gliner_label: "criminal history record"
    patterns:
      - '\b(CHRI)\b'
      - '(?:criminal\s+history|rap\s+sheet)\s*(?:record|number|no\.?|#)?\s*[:#]?\s*([A-Z0-9\-]{3,20})'
      # "CHRI record 889900" — CHRI keyword + record + value
      - '\bCHRI\s+(?:record|#|no\.?)?\s*([A-Z0-9\-]{3,20})'
      - '\b((?:CHRI|CHI|BCHI|CJHI|CBI|CHD|JCRI|LERI|CRRI|CHRE|CJIF|HCRI|CIA|CDRE|CHRIN|JBRI|CRGI|LECHR|OCHR|PSCH|BICH|ICHR|PCHI|JSCR)-\d{3,})\b'
      - '\b((?-i:[A-Z]{2,6})-\d{3,}(?:-\d{1,6})*)\b'
    masking:
      strategy: redact
      format: "[CHRI {n}]"

  - id: arrest_record
    display_name: Arrest Record
    description: "Flag the booking ID, arrest details, or case reference value. NOT the label word 'Arrest Record' itself."
    policy: [law_enforcement]
    enabled: true
    priority: 1
    gliner_label: "arrest record or booking record"
    patterns:
      # With colon separator
      - 'Arrest\s+Record\s*[:#]\s*([A-Za-z0-9\-]+)'
      # With space separator: "Arrest Record AR-777"
      - 'Arrest\s+Record\s+([A-Za-z]{1,3}-\d{1,6})\b'
      - '(?:Booked|Arrested)\s+(?:on\s+)?(\d{4}-\d{2}-\d{2}[^\n]*)'
