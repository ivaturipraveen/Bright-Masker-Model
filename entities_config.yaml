      # SID-STATE-YYYYNNNNN format (GAP-09)
      - '\b(SID-[A-Z]{2}-\d{8,12})\b'
      - '\b((?:SID|OSI|SSI|SRI|SIC|LSI|SAI|SCN|STID|GSI|RSI|PSI)-\d{4,})\b'
